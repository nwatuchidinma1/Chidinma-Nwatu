al Environmental Standards and Regulations Enforcement Agency."}, {"topic": "Audit", "q": "Continuous improvement in environmental audit comes from:", "options": ["Skipping audits", "Hiding findings", "Plan-Do-Check-Act cycle", "Random"], "correct": 2, "explain": "PDCA drives improvement in EMS."}, {"topic": "Process", "q": "GIS in EIA helps with:", "options": ["Marketing", "Spatial analysis of impacts", "Sales", "Music"], "correct": 1, "explain": "Mapping cumulative impacts and sensitive areas."}, {"topic": "Process", "q": "Cost-benefit analysis in EIA helps:", "options": ["Compare alternatives systematically", "Random", "Marketing", "Music"], "correct": 0, "explain": "Evaluates trade-offs of project options."}, {"topic": "HIA", "q": "Health inequalities are:", "options": ["Differences in health between groups", "Random", "Music", "Sales"], "correct": 0, "explain": "HIA addresses these disparities."}, {"topic": "HIA", "q": "Mixed methods in HIA combine:", "options": ["Just numbers", "Just stories", "Quantitative and qualitative data", "Random"], "correct": 2, "explain": "Triangulates evidence."}, {"topic": "Components", "q": "Stakeholder is anyone:", "options": ["Affected by or interested in the project", "With money", "Just owners", "Just workers"], "correct": 0, "explain": "Broad definition includes communities, NGOs, government."}];
const FLASHCARDS = [{"term": "EIA", "def": "Environmental Impact Assessment - formal process to predict environmental consequences of human development activities."}, {"term": "3 Functions of EIA", "def": "Predict problems, find ways to avoid them, enhance positive effects."}, {"term": "5 EIA Steps", "def": "Screening → Scoping → Prediction & Mitigation → Management & Monitoring → Audit."}, {"term": "Screening", "def": "Categorise project; decide if full EIA is needed."}, {"term": "Scoping", "def": "Determine most critical issues to study with community participation."}, {"term": "Prediction & Mitigation", "def": "Detailed studies parallel to feasibility, designing measures to reduce/avoid adverse effects."}, {"term": "Management & Monitoring", "def": "Output is the EIS - detailed plan for managing impacts during and after."}, {"term": "Audit", "def": "Final EIA step - feedback and learning function post-implementation."}, {"term": "EIS", "def": "Environmental Impact Statement - main output document of EIA process."}, {"term": "4 EIA Decisions", "def": "Proceed without modification; Proceed with conditions; New EIS required; Do not proceed."}, {"term": "HIA", "def": "Health Impact Assessment - estimation of overall effects of an action on health of a defined population."}, {"term": "4 HIA Core Values", "def": "Democracy, Equity, Sustainable Development, Ethical Use of Evidence."}, {"term": "6 HIA Stages", "def": "Screening, Scoping, Appraisal, Recommendations, Implementation, Monitoring & Evaluation."}, {"term": "SIA", "def": "Social Impact Assessment - examines social consequences of projects."}, {"term": "SEA", "def": "Strategic Environmental Assessment - applies to policies, plans, programmes."}, {"term": "Cumulative Impact Assessment", "def": "Examines combined effects of multiple projects over time."}, {"term": "Sustainable Development", "def": "Meeting present needs without damaging future generations' health or environment."}, {"term": "Project Proponent", "def": "The entity proposing the project being assessed."}, {"term": "EIA Team", "def": "Multidisciplinary group with expertise across environmental and social domains."}, {"term": "Baseline Data", "def": "Existing environmental conditions before project starts; reference for monitoring."}, {"term": "Mitigation Hierarchy", "def": "Avoid, minimise, restore, offset/compensate."}, {"term": "Residual Impact", "def": "Impact remaining after mitigation measures are applied."}, {"term": "Environmental Management Plan (EMP)", "def": "Required EIS component detailing implementation and monitoring."}, {"term": "Non-technical Summary", "def": "Accessible-language section of EIS for general public."}, {"term": "Environmental Indicators", "def": "Quantifiable measures of environmental status."}, {"term": "Environmental Index", "def": "Aggregated value combining multiple indicators."}, {"term": "Public Participation", "def": "Active involvement of stakeholders, especially during scoping; required for transparent EIA."}, {"term": "Alternatives in EIA", "def": "Different project options identified, evaluated, and compared."}, {"term": "Significance of Impact", "def": "Determined by magnitude, geographic extent, duration, reversibility."}, {"term": "EIA Advantages", "def": "Systematic, informs public/decisions, improved design, cost/benefit trade-off, avoid surprises and retrofits, long-term outlook."}, {"term": "EIA Disadvantages", "def": "Adds complexity, delay, cost; needs multidisciplinary team and expertise; limits proponent options."}, {"term": "Environmental Audit", "def": "Retrospective compliance review of existing operations against environmental standards."}, {"term": "ISO 14000 Series", "def": "International standards for environmental management systems."}, {"term": "ISO 14001", "def": "Specific certifiable standard for Environmental Management Systems."}, {"term": "Compliance Audit", "def": "Verifies adherence to environmental laws and regulations."}, {"term": "Management System Audit", "def": "Evaluates effectiveness of EMS like ISO 14001."}, {"term": "Pre-acquisition Audit", "def": "Due diligence environmental review before buying a facility or property."}, {"term": "Performance Audit", "def": "Measures progress against environmental objectives and targets."}, {"term": "Environmental Statement", "def": "Detailed document presenting EIA findings; output of EIA."}, {"term": "EIS Review Panel", "def": "Body of experts reviewing EIS before approval decision."}, {"term": "Approving Authority", "def": "Government body deciding final approval based on review panel report."}, {"term": "Periodic Monitoring", "def": "Required for approved projects; ensures continued environmental management."}, {"term": "Health Inequalities", "def": "Differences in health between groups; HIA addresses these."}, {"term": "Mixed Methods", "def": "Combination of quantitative and qualitative data; standard in HIA appraisal."}, {"term": "Steering Group", "def": "Multidisciplinary group leading HIA scoping."}, {"term": "NESREA", "def": "National Environmental Standards and Regulations Enforcement Agency - Nigeria's environmental enforcement body."}, {"term": "Outcome Evaluation", "def": "What changed in the population due to the project/policy."}, {"term": "Impact Evaluation", "def": "Causal effect of the project/policy on outcomes."}, {"term": "Stakeholder", "def": "Anyone affected by or interested in the project."}, {"term": "Categorisation", "def": "Output of screening that determines depth of EIA needed."}];
const ESSAYS = [{"title": "Define EIA and explain its three main functions", "points": ["Definition: formal predictive process for environmental consequences", "3 functions: predict problems, avoid them, enhance positives", "Why EIA: complement engineering and economic studies", "Sustainable development concept", "Importance for decision-makers"], "answer": "Environmental Impact Assessment (EIA) is a formal process used to predict the environmental consequences of human development activities and to plan appropriate measures to eliminate or reduce adverse effects while augmenting the positive effects. It serves as a management tool for planners and decision-makers, complementing engineering studies and economic evaluations. EIA has three core functions, often summarised as 'predict, avoid, enhance'. Prediction means forecasting potential environmental, social, and economic impacts of a proposed project before it begins. Avoidance involves designing measures to prevent or minimise adverse impacts identified during prediction. Enhancement, considered the most important function, focuses on maximising the project's positive effects on the environment and host community. The need for EIA emerged from the realisation that uncontrolled development causes adverse impacts that may be irreversible. By integrating environmental concerns into project planning from the outset, EIA facilitates sustainable development, ensuring that current development activities do not compromise the welfare of future generations. In Nigeria, EIA is mandated by the EIA Act of 1992 and enforced by NESREA, making it both a scientific tool and a legal requirement for major development projects."}, {"title": "Discuss the EIA process step by step", "points": ["5 main steps: screening, scoping, prediction/mitigation, management/monitoring, audit", "Screening categorisation", "Scoping community participation", "Prediction parallel to feasibility", "EIS production in management/monitoring phase", "Audit feedback and learning", "Process is flexible, not rigid"], "answer": "The EIA process comprises five main steps, applied flexibly depending on the project's nature and complexity. Step one is screening, which categorises the project to determine whether a full EIA is required, and at what level of detail. Some projects are excluded entirely, others undergo limited assessment, while major projects require full EIA. Step two is scoping, where the EIA team works with the community, regulatory bodies, and other stakeholders to identify the most critical environmental issues that warrant detailed study. Public participation is most active here. Step three is prediction and mitigation, which runs in parallel with feasibility studies. The EIA team predicts the magnitude, extent, duration, and reversibility of impacts, and designs mitigation measures following the hierarchy of avoid, minimise, restore, and offset. Step four is management and monitoring, during which the Environmental Impact Statement (EIS) is produced. The EIS is the main output document, detailing baseline conditions, predicted impacts, mitigation measures, alternatives considered, and an Environmental Management Plan for implementation. Step five is audit, the final step, providing feedback and learning after project implementation. The audit verifies whether predicted impacts matched actual outcomes and whether mitigation measures worked as intended. Findings inform future EIAs, creating a continuous improvement loop. Throughout the process, stakeholder engagement, scientific rigour, and transparency are essential for credibility."}, {"title": "Explain the components and structure of an Environmental Impact Statement", "points": ["Definition: main EIA output document", "Required components: project description, baseline, methodology, predicted impacts, mitigation, alternatives, EMP", "Non-technical summary for public", "References and consultations", "Comparison of alternative sites", "Review process by EIS Review Panel"], "answer": "The Environmental Impact Statement (EIS) is the main output document of the EIA process. It serves as the primary communication tool between the project proponent, regulators, and the public, and forms the basis for environmental conditions in project approval. A standard EIS contains ten essential components. The non-technical summary opens the document, presenting findings in accessible language for the general public who lack technical training. The project description follows, detailing what is proposed, including location, technology, scale, and timeline. Baseline environmental conditions describe the existing state of the environment before the project, providing the reference point against which impacts are measured. The methodology section explains how the assessment was conducted, the techniques used, and any limitations. Predicted impacts are then presented systematically, both positive and negative, broken down by environmental component such as air, water, soil, biodiversity, and social factors. Mitigation measures explain how negative impacts will be reduced or avoided. Alternatives considered, including the no-project alternative, are evaluated and compared, with reasons given for the preferred option. The Environmental Management Plan (EMP) details how implementation and monitoring will occur. Residual impacts identify what cannot be eliminated even with mitigation. References and consultations close the report, listing sources used and stakeholder input received. The EIS is reviewed by an EIS Review Panel of experts before the approving authority makes its decision."}, {"title": "Discuss the four possible decisions following EIA review", "points": ["Proceed without modification", "Proceed with modifications and conditions", "EIS not satisfactory - new EIS required", "Do not proceed", "Each scenario explained", "Role of approving authority", "Post-approval monitoring requirements", "Continuous community engagement"], "answer": "After the EIS Review Panel completes its evaluation, it submits a detailed report to the approving authority, which can then issue one of four possible decisions. The first decision is to proceed without modification. This applies when the EIS demonstrates that environmental impacts are negligible or fully mitigated, and the project can move forward as proposed. This decision is rare for major projects. The second is to proceed with modifications subject to certain conditions. This is the most common outcome for approved projects. Conditions may include specific mitigation requirements, monitoring schedules, environmental performance bonds, community development obligations, or restrictions on operating hours. The proponent must comply with these conditions throughout the project life. The third decision is that the EIS is unsatisfactory and a new EIS is required. This happens when the assessment is inadequate, key issues are missing, baseline data are insufficient, or alternatives have not been properly explored. The proponent must restart significant portions of the EIA process. The fourth decision is to not proceed at all. This applies when impacts are unacceptable, mitigation cannot adequately address the harms, or the project conflicts with environmental, social, or legal frameworks. After approval, periodic monitoring and auditing are required to ensure continued compliance, and the views of affected people must be sought at each monitoring exercise. This continuous engagement reflects the principle that EIA is not a one-time event but an ongoing commitment."}, {"title": "Discuss the advantages and disadvantages of applying EIA", "points": ["Advantages: systematic, transparent, improved design, cost-benefit trade-off, integration mechanism, feedback, early discussion, long-term outlook, avoid surprises and retrofit", "Disadvantages: complexity, delay, cost, multidisciplinary team needed, environmental systems expertise, schedule forecasting, limits proponent options", "Balance and value"], "answer": "EIA brings significant advantages to the planning of development projects. As a systematic approach, it provides reliable information to decision-makers and the public, enhancing transparency and accountability. EIA improves project design by identifying problems early, when modifications are inexpensive and easy to implement. The process estimates cost-benefit trade-offs of alternative actions, allowing comparison of options on economic, social, and environmental grounds. EIA serves as a coordination mechanism for environmental integration and negotiation among stakeholders, balancing development with conservation. The continuous feedback through audit creates a learning loop, encouraging early discussion of issues and a long-term outlook beyond immediate construction. By predicting impacts in advance, EIA helps avoid surprises and the high cost of retrofitting environmental controls after construction. However, EIA has real disadvantages. It adds complexity and delay to project schedules, sometimes by months or years. It is costly, requiring multidisciplinary teams with specialist expertise in environmental systems. Cost and schedule forecasting is difficult, as study findings can change project scope. EIA may also limit proponent options, restricting design freedom or eliminating preferred sites. The expertise required is not always available locally, and quality varies. Despite these drawbacks, the long-term benefits of EIA in preventing environmental damage, public health harm, and social conflict typically outweigh the upfront costs and delays. The disadvantages are best addressed through better training, streamlined processes, and political commitment to sustainable development."}, {"title": "Define HIA and discuss its core values and aims", "points": ["Definition: estimation of effects on health of a defined population", "Aims: assess potential impacts (positive and negative), improve policy decisions", "What HIA does: focuses on social/environmental justice, multidisciplinary, participatory", "4 core values: democracy, equity, sustainable development, ethical use of evidence", "Common applications"], "answer": "Health Impact Assessment (HIA) is the estimation of the overall effects of a specified action on the health of a defined population. It systematically assesses the potential health impacts, both positive and negative, of proposed policies, programmes, or projects, and recommends ways to maximise positive effects while minimising negative ones. HIA aims to improve the quality of public policy decisions by ensuring that health considerations are not overlooked in sectors traditionally outside the health system, such as transport, housing, energy, and trade. HIA is guided by four core values. Democracy means involving the public in decisions affecting their health, ensuring those who will live with the consequences have a voice in shaping them. Equity focuses on social and environmental justice, paying particular attention to vulnerable populations and health inequalities, since policies that affect average outcomes can still widen disparities. Sustainable development requires meeting present health needs without compromising the ability of future generations to meet their own, considering long-term consequences and intergenerational responsibility. Ethical use of evidence means employing the best available evidence honestly and transparently, acknowledging uncertainties, and avoiding selective use of data to support predetermined conclusions. HIA is applied to a wide range of decisions, including new motorway construction, airport expansion, waste management facilities, large housing developments, and economic development plans. Through its multi-disciplinary, participatory approach, HIA brings public health into the foreground when organisations make important decisions, ensuring health remains central to development choices."}, {"title": "Discuss the six stages of Health Impact Assessment", "points": ["1. Screening - selection and population profiling", "2. Scoping - identify potential impacts with steering group", "3. Appraisal - mixed methods evaluation", "4. Recommendations - reporting and managing", "5. Implementation - applying recommendations", "6. Monitoring & Evaluation - process, impact, outcome", "Importance of evidence hierarchy"], "answer": "HIA proceeds through six well-defined stages, each building on the previous one. Stage one is screening, where the proposed policy or project is selected and analysed for assessment, the affected population is profiled, and a decision is made on whether a full HIA is needed. Stage two is scoping, in which a multidisciplinary steering group identifies the potential health impacts and negotiates options for assessment. Boundaries are set, methodologies chosen, and resources allocated. Stage three is appraisal, the heart of the HIA, where the importance, scale, and likelihood of impacts are evaluated using mixed methods that combine quantitative data such as exposure modelling and disease incidence with qualitative data from community consultations and expert opinion. Health indicators are used to detect variations in impact across different population groups, revealing potential inequalities. Stage four is recommendations, where the appraisal findings are translated into actionable proposals to manage the predicted impacts. The report explains the rationale, options, and trade-offs to inform decision-makers. Stage five is implementation, where the agreed recommendations are put into action, often requiring institutional commitment, funding, and inter-sectoral coordination. Stage six is monitoring and evaluation, which tracks the actual impacts as they unfold and evaluates both the process (how well the HIA was conducted) and the outcomes (whether predicted impacts occurred and recommendations were effective). This stage closes the loop, providing learning for future HIAs. Throughout all six stages, stakeholder engagement, transparency, and the four core values of HIA guide the work."}, {"title": "Compare EIA and HIA", "points": ["Both predictive frameworks", "EIA: broad environmental + social + economic", "HIA: focused on health and equity", "EIA used for projects; HIA also for policies", "Different stages but similar logic", "Both involve stakeholders", "Complementary not competing", "Examples of joint application"], "answer": "EIA and HIA share common roots as predictive assessment frameworks designed to anticipate the consequences of human activities before they occur, but they differ in scope, focus, and application. EIA is broader, assessing environmental, social, and economic impacts of proposed projects on the bio-physical environment and human welfare. It is well-established legally in many countries and is mandatory for major development projects such as dams, highways, and industrial facilities. HIA is narrower in subject matter but often broader in application, focusing specifically on the health of defined populations. While EIA is primarily applied to projects, HIA can also be applied to policies and programmes, including those in sectors not traditionally considered to affect health, such as taxation, agriculture, and education. Both processes follow logical sequences. EIA has five stages: screening, scoping, prediction and mitigation, management and monitoring, and audit. HIA has six: screening, scoping, appraisal, recommendations, implementation, and monitoring and evaluation. Both involve stakeholder engagement and require multidisciplinary teams. Both produce documents that inform decision-makers and the public. The two processes are complementary rather than competing. Many EIAs include health components, and HIAs may use environmental data generated by EIA work. Joint or integrated assessments, sometimes called Environmental Health Impact Assessment, are increasingly used for projects with significant health implications, such as oil and gas extraction, large infrastructure, and industrial parks. The choice between EIA, HIA, or both depends on the nature of the activity, regulatory requirements, and stakeholder concerns."}, {"title": "Discuss types of impact assessments", "points": ["EIA - environmental", "HIA - health", "SIA - social", "SEA - strategic (policies, plans, programmes)", "Cumulative impact assessment - combined effects", "Risk assessment", "All complementary in sustainable development"], "answer": "A range of impact assessment types has emerged to address the complexity of modern development decisions. Environmental Impact Assessment (EIA) is the foundational and most established type, evaluating the environmental, social, and economic impacts of proposed projects. Health Impact Assessment (HIA) focuses specifically on the health effects of policies, programmes, and projects, paying particular attention to health equity. Social Impact Assessment (SIA) examines the social consequences of projects, including effects on community structure, livelihoods, cultural practices, and human rights. SIA is particularly important for projects involving displacement, indigenous communities, or significant changes to local economies. Strategic Environmental Assessment (SEA) applies to higher-level decisions such as policies, plans, and programmes rather than individual projects. SEA is used for sectoral plans like transport master plans, energy policies, or land use plans, allowing strategic environmental considerations to be integrated before specific projects are even proposed. Cumulative Impact Assessment looks at the combined effects of multiple projects over time, recognising that individually minor impacts can become significant when added together. This is essential in regions with multiple development activities such as oil and gas basins or river systems with many dams. Risk Assessment, while distinct, often complements impact assessment, focusing on the probability and severity of adverse events. These assessment types are complementary tools for sustainable development. The choice depends on the decision being made, regulatory requirements, and the issues of greatest concern to stakeholders. Increasingly, integrated assessments combine elements from multiple types to give a holistic view of proposed activities."}, {"title": "Discuss the role of public participation in EIA", "points": ["When: most active in scoping, also in alternatives review and decision", "Why: transparency, identifying priorities, community knowledge", "Methods: consultations, hearings, questionnaires, workshops", "Stakeholders: communities, NGOs, technical experts, government", "Benefits: better decisions, public trust, conflict reduction", "Challenges: representativeness, language, power dynamics"], "answer": "Public participation is a cornerstone of credible EIA, ensuring that the people who will be affected by a project have a voice in shaping it. Participation is most active during scoping, when the issues to be studied are being defined, but should continue throughout the assessment, especially during alternatives review and the decision phase. The rationale for participation is multi-faceted. It enhances transparency by making the EIA process open to scrutiny. It identifies community priorities and concerns that technical experts alone might miss. It taps into local knowledge about the environment, livelihoods, and cultural sites. It builds public trust in the project and its proponents, reducing the likelihood of conflict and litigation. Methods of participation include public consultations, formal hearings, household questionnaires, focus group discussions, community workshops, advisory committees, and increasingly, digital platforms and social media. The choice depends on the population, the project, and resources available. Stakeholders include directly affected communities, indigenous peoples, NGOs, technical experts, government agencies, business interests, and the general public. Effective participation requires reaching beyond articulate elites to include vulnerable groups such as women, the elderly, the poor, and minorities. Benefits of robust participation include better-quality decisions, improved project design, stronger public trust, reduced conflict, and faster implementation once projects are approved. However, participation faces challenges. Representativeness is difficult, language and literacy barriers can exclude voices, power imbalances may silence the marginalised, and 'participation fatigue' can set in over long projects. Best practice involves multiple methods, capacity building for participants, and feedback to show how input was used."}, {"title": "Discuss Environmental Audit: types, methods, and benefits", "points": ["Definition: post-implementation compliance review", "Types: compliance, management system, waste, energy, water, pre-acquisition, performance", "Field methods: inspection, checklists, interviews, sampling", "Lab methods: AAS, gas chromatography, microbial counts", "Benefits: compliance, cost savings, certification, reputation, training", "ISO 14001 relevance"], "answer": "Environmental Audit (EA) is a systematic, post-implementation review of operations, organisations, or facilities to determine compliance with environmental laws, regulations, and internal policies. While EIA is predictive, EA is retrospective, looking at how an organisation actually performs against established standards. Several types of audit serve different purposes. Compliance audit confirms adherence to environmental laws and regulations. Management system audit evaluates the Environmental Management System, often against ISO 14001 standards. Waste audit tracks waste generation, handling, and disposal. Energy audit assesses energy consumption and identifies efficiency opportunities. Water audit evaluates water use and discharge. Pre-acquisition audit serves as due diligence before buying property or facilities, identifying environmental liabilities. Performance audit measures progress against environmental objectives and targets. Field methods used in environmental audit include physical site inspection, structured checklists tailored to the operation, interviews with personnel at all levels, sample collection of air, water, soil, and waste, photographic documentation, review of housekeeping and storage practices, inspection of pollution control equipment, and walking the production process from start to finish. Laboratory techniques include atomic absorption spectrophotometry for heavy metals, gas chromatography for volatile organic compounds, microbial counts for biological contamination, and BOD/COD analysis for wastewater. The benefits are substantial: regulatory compliance and reduced legal risk, identification of cost savings through reduced waste and energy use, improved environmental performance, enhanced corporate reputation, support for ISO 14001 certification, identification of training needs, and stronger stakeholder trust. Increasingly, environmental audits are integrated with health and safety audits, supporting comprehensive HSE management."}, {"title": "Discuss ISO 14000 series and ISO 14001 in EIA management", "points": ["Definition: international environmental management standards", "ISO 14001: certifiable EMS standard", "Components: policy, planning, implementation, evaluation, improvement", "Plan-Do-Check-Act cycle", "Continuous improvement", "Benefits: legal compliance, market access, reduced waste, employee engagement", "Application to EIA implementation"], "answer": "The ISO 14000 series is a family of international standards developed by the International Organization for Standardization to provide practical tools for organisations seeking to manage their environmental responsibilities. The series covers various aspects of environmental management, including environmental management systems, environmental auditing, environmental labelling, life-cycle assessment, and environmental performance evaluation. ISO 14001 is the most widely known and the only standard in the series against which an organisation can be certified. It specifies the requirements for an Environmental Management System (EMS), allowing an organisation of any size or sector to demonstrate environmental responsibility. ISO 14001 follows the Plan-Do-Check-Act (PDCA) cycle, supporting continuous improvement. Plan: identify environmental aspects, assess impacts, set objectives and targets, plan controls. Do: implement the plan, train workers, run controls, document procedures. Check: monitor performance, conduct internal audits, review compliance. Act: take corrective and preventive action, review management commitment, then plan again. Key components include an environmental policy from top management, planning based on legal compliance and risk assessment, operational implementation with defined roles and responsibilities, monitoring and evaluation including internal audits, and management review for continuous improvement. The benefits of ISO 14001 certification include legal compliance, market access (especially in Europe and the US), reduced waste and energy costs, improved employee engagement, stakeholder confidence, and a structured approach to managing environmental risk. In the context of EIA, ISO 14001 is particularly valuable during the implementation phase, where it provides the framework for executing the Environmental Management Plan that emerges from the EIS. Many regulators now require ISO 14001 certification or equivalent for major project operators."}, {"title": "Discuss the methods, techniques, or process of EIA", "points": ["Methodology: secondary data review, field data collection, analysis, impact projection", "Secondary data: meteorological, geo-physical, soil, sensitive locations", "Field data: inventories, sampling (air, water, soil, noise), public consultation", "Analysis methods: weighing, categorising, expert knowledge", "Projection: mathematical models, Delphi technique", "Output: EIS submitted for review"], "answer": "The methodology of EIA involves a structured sequence of activities. The first phase is collection and review of secondary data, encompassing existing information that informs the assessment. This includes meteorological data such as rainfall, temperature, humidity, and seasonal patterns; geo-physical aspects including district gazetteers, geological maps, and topography; soil characteristics covering type, cohesion, permeability, and fertility; drainage and watercourse mapping; and sensitive locations such as forests, parks, sanctuaries, and habitats of endangered species. Existing air, water, and noise quality data from regulatory bodies are reviewed, and data gaps are identified for primary collection. The second phase is collection of field data, which fills the gaps. Field activities include site reconnaissance to understand context, inventory of environmental features within the project right-of-way (ponds, soil, water resources, wetlands, vegetation, forest), inventory of public facilities (hand pumps, schools, hospitals), inventory of historical or religious structures, rapid tree estimation, air quality sampling for pollutants like PM10, PM2.5, SO2, NOx, CO, and benzene, water quality sampling of surface and groundwater, noise monitoring during day and night, soil and biodiversity surveys, public consultation through questionnaires, and photographic documentation. The third phase is data analysis, where collected information is weighted, categorised, and presented simply for the public. Expert knowledge is integrated. The fourth phase is impact projection, using mathematical models, the Delphi technique for expert consensus, and scenario analysis to predict changes in population, economic factors, infrastructure demand, land use, healthcare, public costs, siltation, biodiversity loss, and overall environmental quality. The outputs feed into the EIS, which is submitted for review."}, {"title": "Explain technical details of impact prediction in EIA", "points": ["Magnitude assessment", "Geographic extent", "Duration", "Reversibility", "Population affected", "Frequency", "Significance criteria", "Mathematical models", "Delphi technique - expert consensus", "Mitigation hierarchy: avoid, minimise, restore, offset"], "answer": "Impact prediction is the analytical core of EIA, transforming baseline data and project descriptions into forecasts of environmental change. Several dimensions are assessed for each predicted impact. Magnitude refers to the size or intensity of the change, often expressed in absolute or relative terms. Geographic extent describes the spatial scale, ranging from local to regional, national, or global. Duration assesses how long the impact persists: short-term (during construction), medium-term (operational), or long-term (permanent). Reversibility examines whether the impact can be reversed naturally or through intervention, or whether it is permanent. Population affected identifies who experiences the impact, including humans, fauna, flora, and ecosystems. Frequency captures how often the impact occurs: continuous, intermittent, or rare. These dimensions combine to determine significance, the overall importance of an impact, classified as negligible, minor, moderate, major, or critical. Significance criteria vary by jurisdiction but typically include legal thresholds, ecological importance, social value, and reversibility. Several techniques support prediction. Mathematical models simulate physical and chemical processes, such as air dispersion models for pollutant spread, hydrological models for water flow, and noise propagation models. The Delphi technique gathers expert consensus through iterative questionnaires, useful when data are sparse and judgment is essential. Scenario analysis explores plausible futures under different assumptions. Geographic Information Systems (GIS) overlay multiple data layers spatially, revealing cumulative impacts. Once impacts are predicted, mitigation follows the standard hierarchy: avoid the impact altogether through design changes, minimise it through engineering controls, restore the affected environment, or offset it through equivalent improvements elsewhere. Residual impacts, those remaining after mitigation, must be documented and accepted by decision-makers."}, {"title": "Discuss case studies of EIA application", "points": ["Dam construction: water table changes, displacement, biodiversity loss", "Highway: noise, air quality, severance, wildlife corridors", "Oil and gas: spills, gas flaring, community health", "Industrial: emissions, waste, occupational health", "Mining: land use, water pollution, rehabilitation", "Agriculture: deforestation, pesticides, biodiversity"], "answer": "EIA has been applied to a wide range of development projects, with each sector raising distinct environmental concerns. Dam construction projects are classic EIA applications. Major impacts include changes to water tables affecting agriculture and wells, displacement of communities sometimes numbering tens of thousands, loss of cultural and historical sites, biodiversity loss in submerged areas, downstream changes in flow regime and sediment transport, and altered fishery ecosystems. EIAs typically recommend resettlement plans, fish ladders, environmental flow releases, and biodiversity offsets. Highway construction triggers EIAs because of noise pollution affecting roadside communities, air quality impacts from vehicle emissions, severance of communities and ecosystems, wildlife mortality from collisions, and induced development along corridors. Mitigation includes wildlife crossings, noise barriers, traffic management, and route alignment to avoid sensitive areas. Oil and gas projects require detailed EIAs given their scale and risks. Concerns include oil spills devastating ecosystems, gas flaring contributing to climate change and respiratory illness, community health from chronic exposure, social tensions over benefits and impacts, and decommissioning liabilities. Mitigation focuses on best engineering practices, leak detection, gas reinjection or commercialisation, community development agreements, and rigorous monitoring. Industrial projects raise issues of air and water emissions, hazardous waste generation, occupational health and safety, and noise. Mining brings land use change, water pollution from acid mine drainage, dust and noise, and post-closure rehabilitation challenges. Agricultural projects, especially large plantations, raise concerns about deforestation, pesticide use, biodiversity loss, and indigenous land rights. In each case, EIA provides a structured way to identify impacts and design mitigation, even where complete prevention is impossible. Lessons from past EIAs inform improving methodologies and stricter regulatory frameworks."}, {"title": "Explain the regulatory requirements for EIA in Nigeria", "points": ["EIA Act of 1992", "Federal Ministry of Environment / NESREA", "Categorisation: I (mandatory), II (variable), III (excluded)", "Notice of intent", "Mandatory study", "EIS submission and review", "Public participation", "Decisions and conditions", "Monitoring after approval"], "answer": "Nigeria's regulatory framework for EIA is anchored in the Environmental Impact Assessment Act of 1992, which makes EIA mandatory for major public and private development projects. The Act is administered by the Federal Ministry of Environment, with enforcement by NESREA, the National Environmental Standards and Regulations Enforcement Agency, established in 2007. Projects are categorised into three groups. Category I projects, including dams, oil and gas, mining, and major infrastructure, automatically require full EIA. Category II projects may require EIA depending on size, location, and sensitivity, determined through screening. Category III projects are excluded from EIA requirements, typically small-scale or low-impact activities. The process begins with a Notice of Intent submitted by the proponent. NESREA evaluates the notice and confirms whether full EIA is needed. The proponent then conducts a mandatory study, engaging a registered EIA consultant and a multidisciplinary team. Baseline studies, impact prediction, mitigation design, and stakeholder consultation are all required. The Environmental Impact Statement is submitted to NESREA, which appoints an EIS Review Panel of experts. The panel reviews the EIS, may visit the site, holds public consultations, and submits a report to the approving authority. Public participation is mandatory, with at least one round of public hearings or display of the draft EIS for public comment. Following review, the Federal Ministry of Environment issues one of the four standard decisions: proceed without modification, proceed with conditions, require new EIS, or do not proceed. Approved projects must implement the Environmental Management Plan and report periodically. NESREA conducts compliance monitoring, can issue stop orders, and can prosecute violations. Despite the strong legal framework, implementation challenges include capacity gaps, inadequate funding, and political pressures. Continuous reform aims to strengthen enforcement and integrate climate change considerations."}, {"title": "Discuss environmental indicators and indices", "points": ["Definition: quantifiable measures", "Types: pressure, state, response", "Examples: water quality index, air quality index, biodiversity index", "Aggregation methods", "Limitations: oversimplification, indicator selection", "Use in EIA baseline and monitoring", "Public communication value"], "answer": "Environmental indicators are quantifiable measures that provide information about the state of the environment, the pressures upon it, and the responses being made. They simplify complex environmental data into a form usable by decision-makers, the public, and the media. Indicators are commonly classified using the Pressure-State-Response framework. Pressure indicators measure human activities affecting the environment, such as emissions, water withdrawals, or land conversion rates. State indicators measure the condition of the environment, such as air pollutant concentrations, biodiversity counts, or water quality parameters. Response indicators measure the actions taken to address pressures and improve state, such as emission control investments, protected area coverage, or recycling rates. Common examples include the Air Quality Index (AQI) which combines multiple pollutants into a single accessible value; the Water Quality Index (WQI) which integrates parameters like dissolved oxygen, biochemical oxygen demand, pH, nitrates, and coliforms; biodiversity indices such as the Shannon Index measuring species diversity; and the Environmental Performance Index ranking countries on environmental health and ecosystem vitality. Indices are constructed by aggregating multiple indicators using weighting and normalisation. Different aggregation methods include arithmetic mean, geometric mean, and minimum operator. The choice of method affects the final value and interpretation. In EIA, indicators are central to baseline data collection, impact prediction, and monitoring. Baseline values establish the starting point, predicted changes inform impact significance, and ongoing monitoring detects deviation from predictions. Indicators also support public communication, translating technical data into stories that engage stakeholders. Limitations include oversimplification of complex realities, subjectivity in indicator selection and weighting, data gaps especially in developing countries, and the risk of focusing on what is measurable rather than what is important. Best practice combines indicators with qualitative analysis and stakeholder engagement."}, {"title": "Discuss mitigation measures in EIA", "points": ["Mitigation hierarchy: avoid, minimise, restore, offset/compensate", "Examples per environmental component (air, water, biodiversity, social)", "Cost-effectiveness", "Implementation responsibility", "Monitoring effectiveness", "Adaptive management", "Documentation in EMP"], "answer": "Mitigation measures are interventions designed to eliminate, reduce, or offset adverse environmental impacts of a project. They follow the mitigation hierarchy, applied in order of preference. Avoidance, the first and most preferred option, eliminates the impact altogether through design changes such as relocating a project away from sensitive habitats. Minimisation reduces the magnitude or duration of unavoidable impacts through engineering controls, operational practices, or scheduling changes. Restoration repairs or rehabilitates the affected environment after impacts occur, such as replanting vegetation or treating contaminated soil. Offsetting or compensation provides equivalent environmental gains elsewhere when residual impacts cannot be addressed through the previous steps, such as biodiversity offsets or replacement wetlands. Specific examples cross environmental components. For air quality, mitigation includes use of cleaner fuels, scrubbers and filters, dust suppression on construction sites, and traffic management. For water resources, treatment plants, settling ponds, riparian buffers, and water conservation systems are common. For biodiversity, measures include wildlife corridors, fencing of construction areas, breeding programmes, and habitat restoration. For social impacts, resettlement action plans, livelihood restoration, community development funds, and grievance mechanisms are used. For noise, barriers, time-of-day restrictions, and equipment maintenance reduce levels. Cost-effectiveness varies, but the long-term costs of unmitigated impacts typically exceed mitigation costs. Implementation responsibility lies primarily with the proponent, supported by contractors and overseen by regulators. Monitoring effectiveness is critical, with predefined indicators and regular reporting to verify that mitigation works as predicted. Adaptive management adjusts measures based on monitoring results. All mitigation commitments are documented in the Environmental Management Plan within the EIS, becoming binding conditions of project approval. Failure to implement mitigation can lead to penalties, project shutdown, and reputational damage."}, {"title": "Discuss alternatives analysis in EIA", "points": ["Why alternatives matter", "Types: site, design, technology, scale, no-action alternative", "Comparison criteria: environmental, social, economic", "Multi-criteria analysis", "Stakeholder input", "Selecting preferred alternative", "Importance for transparency and defensibility"], "answer": "Alternatives analysis is a fundamental requirement in EIA, ensuring that decision-makers consider multiple options before settling on the project as proposed. It demonstrates that environmental concerns have been integrated from the design stage rather than as an afterthought, increasing transparency and defensibility of decisions. Several types of alternatives are typically considered. Site alternatives compare different locations, evaluating each for environmental sensitivity, infrastructure access, and social impact. Design alternatives examine different layouts, technologies, or processes within a chosen site, such as alternative routes for a highway or different turbine designs for a wind farm. Technology alternatives compare available technologies for the same purpose, such as different power generation options. Scale alternatives consider the size or capacity of the project, since larger projects often have proportionally greater impacts. The no-action alternative is mandatory, representing what would happen without the project, providing a baseline against which other alternatives are compared. Comparison criteria include environmental impacts (air, water, soil, biodiversity, climate), social impacts (displacement, livelihoods, cultural heritage, health), economic impacts (capital costs, operating costs, employment, taxes), and technical feasibility. Multi-criteria analysis is often used to integrate disparate criteria, sometimes with stakeholder input on weighting. Stakeholder input throughout the alternatives analysis ensures that local concerns shape the choice rather than being addressed only at the mitigation stage. Methods include structured workshops, advisory committees, and questionnaires. The preferred alternative emerges from comparison, with reasons documented for choosing it over others. Sometimes the preferred alternative differs from the proponent's original proposal, demonstrating that the EIA process has genuinely shaped decisions. Failure to analyse alternatives is a common weakness in EIAs, often grounds for rejection by review panels or courts. Best practice involves early identification of credible alternatives, transparent comparison, and meaningful stakeholder engagement throughout."}, {"title": "Discuss the need to incorporate health considerations in EIA", "points": ["Traditional EIA focus on bio-physical", "Growing recognition of health dimensions", "HIA can be standalone or integrated", "Health in EIA: occupational, community, vulnerable groups", "Determinants beyond medical: housing, transport, employment, environment", "WHO advocacy", "Examples of integration"], "answer": "Traditional EIA has focused primarily on bio-physical impacts such as air quality, water resources, and biodiversity, with limited attention to human health. Recent decades have seen growing recognition that development projects can have profound health implications that deserve systematic assessment. Health Impact Assessment (HIA) can stand alone, but is increasingly integrated into EIA to provide a more complete picture of project impacts. When health is incorporated into EIA, several dimensions are considered. Occupational health addresses workers exposed during construction and operation, covering chemical exposures, physical hazards, ergonomic risks, and psychosocial stressors. Community health assesses how surrounding populations may be affected through changes in environmental quality, infrastructure access, and social conditions. Vulnerable groups including children, the elderly, pregnant women, and those with pre-existing conditions require special attention since impacts often fall disproportionately on them. Health determinants extend well beyond medical care. The social determinants of health include housing quality, transport access, employment opportunities, education, social cohesion, and the natural environment. A new highway, for example, may improve health by enabling faster ambulance response while harming health through air pollution, accidents, and community severance. The World Health Organization (WHO) has long advocated for incorporating health into all policy areas through 'Health in All Policies', emphasising that health is shaped by sectors beyond healthcare. Examples of successful integration include oil and gas projects in the Niger Delta where community health monitoring identifies respiratory effects of gas flaring; mining projects where occupational and community health surveillance is mandated; and large infrastructure where vector-borne disease control is integrated with environmental management. Methods used include health impact pathway analysis, exposure-response assessment, vulnerability mapping, and health surveillance programmes. Integrated assessments produce more robust conclusions and increase the legitimacy of decisions, particularly for projects affecting marginalised communities."}, {"title": "Discuss the principles of sustainable development", "points": ["Definition (Brundtland): meeting present needs without damaging future", "Three pillars: environmental, social, economic", "Intergenerational equity", "Precautionary principle", "Polluter pays", "Public participation", "Integration", "Application in EIA"], "answer": "Sustainable development was defined by the Brundtland Commission in 1987 as development that meets the needs of the present without compromising the ability of future generations to meet their own needs. This deceptively simple statement has shaped global environmental policy for decades and underpins the EIA process. Sustainable development rests on three interconnected pillars. The environmental pillar maintains the integrity of natural systems, conserving biodiversity, preventing pollution, and ensuring ecological resilience. The social pillar promotes equity, social justice, and human rights, ensuring that development benefits all groups including the marginalised. The economic pillar pursues prosperity and livelihoods, but in ways consistent with environmental and social constraints. The three pillars must be balanced, with no single pillar dominating. Several principles operationalise sustainable development. Intergenerational equity holds that current generations have a duty to leave the world in no worse condition for future generations, recognising that long-lived environmental damage transfers costs to those not yet born. The precautionary principle states that where there are threats of serious or irreversible damage, lack of full scientific certainty should not delay protective action. The polluter pays principle assigns the costs of pollution to those who cause it, internalising environmental costs in economic decisions. Public participation principle ensures that those affected by environmental decisions have a voice in making them. Integration requires that environmental considerations are built into all sectors and policies, not left to environment ministries alone. EIA operationalises these principles by predicting environmental and social impacts before projects begin, ensuring stakeholder participation, identifying mitigation measures, and supporting decisions that balance development needs with environmental and social protection. The Sustainable Development Goals (SDGs) adopted by the United Nations in 2015 provide a global framework with 17 goals covering poverty, health, education, gender, water, energy, climate, and ecosystems, all relevant to environmental health practice in Nigeria and beyond."}, {"title": "Discuss community participation in HIA", "points": ["Why participation matters", "Stages where most active: scoping, recommendations, monitoring", "Methods: focus groups, surveys, workshops, advisory groups", "Inclusion of vulnerable groups", "Challenges: power, capacity, language", "Benefits: legitimacy, better evidence, ownership", "Examples of effective participation"], "answer": "Community participation is fundamental to Health Impact Assessment (HIA), aligning with its core values of democracy and equity. Participation matters because affected communities possess unique knowledge of local conditions, understand health priorities that may differ from technical experts, and ultimately bear the consequences of decisions made. Excluding them undermines the legitimacy and effectiveness of HIA. Participation is most active at three stages of HIA. Scoping benefits from community input on which health issues to study, ensuring locally relevant priorities shape the assessment. The recommendations stage uses community feedback to identify acceptable mitigation measures and ensure cultural appropriateness. The monitoring stage relies on community-based health surveillance, where residents track impacts as they unfold. Methods of participation include focus group discussions allowing in-depth exploration of perceptions; household surveys quantifying community views; community workshops bringing diverse voices together; advisory groups providing ongoing guidance; key informant interviews with community leaders; and increasingly, digital platforms reaching wider audiences. Methods should be combined since each captures different perspectives. Inclusion of vulnerable groups requires deliberate effort. Women, children, the elderly, the poor, indigenous peoples, and those with disabilities often face barriers to participation including time constraints, lack of childcare, language differences, illiteracy, and social marginalisation. Effective HIA uses targeted methods to reach them, such as separate women's focus groups or village-level meetings. Challenges include power imbalances between project proponents and communities, capacity constraints on both sides, language and literacy barriers, time pressure, and 'consultation fatigue' from too many engagements. Benefits when participation is done well include enhanced legitimacy of HIA findings, better-quality evidence through local knowledge, community ownership of recommendations, reduced conflict, and stronger implementation. Successful examples include HIAs of mining projects in Latin America where indigenous community input shaped both the assessment and operational practices; airport expansions in Europe where neighbour groups influenced operating restrictions; and urban planning HIAs where resident workshops shaped active travel infrastructure."}, {"title": "Discuss the role of EIA in sustainable infrastructure development", "points": ["Infrastructure: dams, roads, ports, power plants", "Environmental impacts of major projects", "EIA as gatekeeper", "Mitigation built in from design", "Long-term monitoring", "Adaptive management", "Case examples", "Balance development and environment"], "answer": "Infrastructure development is essential for economic growth and human welfare but can carry significant environmental costs. Dams provide power and water but submerge ecosystems and displace communities. Roads connect markets but fragment habitats and induce sprawl. Ports enable trade but disturb marine ecosystems. Power plants generate electricity but emit pollutants and greenhouse gases. EIA serves as a critical gatekeeper, ensuring that infrastructure decisions integrate environmental sustainability rather than treating it as an afterthought. EIA influences infrastructure projects from the earliest stages. During concept development, screening and scoping identify environmental considerations that shape design. During detailed design, prediction and mitigation embed environmental protections such as fish passages in dams, wildlife corridors across highways, sediment controls at ports, and pollution controls at power plants. The EIS documents these commitments, and the Environmental Management Plan operationalises them during construction and operation. Long-term monitoring tracks performance against predictions, allowing adaptive management as conditions change. Where impacts exceed expectations, mitigation can be intensified or modified. The benefits of EIA-informed infrastructure are substantial. Designs are more environmentally friendly from the outset, reducing the cost of retrofits. Communities benefit from project gains while being protected from harms. Long-term project viability is enhanced through lower social conflict and regulatory risk. Lenders and investors increasingly require EIA compliance, with international finance institutions like the World Bank, IFC, and African Development Bank applying rigorous environmental and social safeguards. Case examples demonstrate the value. The Three Gorges Dam in China, despite its scale, included EIAs that shaped resettlement and ecological monitoring. The Volta River Project in Ghana faced criticism for inadequate early assessment but later incorporated lessons. Recent African examples include solar projects in Morocco where EIA shaped siting away from sensitive areas, and the Mombasa-Nairobi railway in Kenya where EIA conditions influenced wildlife corridor designs. The challenge remains balancing urgent development needs with environmental protection, requiring strong institutions, transparent processes, and continued political commitment to sustainability."}, {"title": "Discuss screening criteria in EIA", "points": ["Purpose: decide if full EIA is needed", "Criteria: project type, location, size, sensitivity of receiving environment", "Categorisation systems (Nigeria categories I, II, III)", "Sensitive areas: wetlands, parks, communities", "Initial environmental examination as alternative", "Documentation of decision", "Appeals process"], "answer": "Screening is the first step of EIA, deciding which projects require full assessment, which need limited assessment, and which are exempt. Effective screening directs resources to projects with significant impacts while avoiding unnecessary burden on minor projects. Screening criteria fall into several categories. Project type considers the kind of activity, with some categories such as dams, oil and gas, mining, large industrial facilities, and major transport infrastructure typically requiring full EIA based on their characteristic impacts. Project size matters because larger projects generally have greater impacts. Thresholds based on capacity, footprint, throughput, or production volume trigger EIA requirements. Project location is critical since identical projects can have different significance depending on the receiving environment. Projects in or near sensitive areas including wetlands, parks, protected habitats, indigenous lands, watershed areas, or densely populated communities raise the screening threshold. Sensitivity of the receiving environment depends on ecological value, cultural significance, social vulnerability, and existing pollution loads. Many countries use categorisation systems. Nigeria uses a three-category system. Category I includes projects automatically requiring full EIA, such as dams above certain sizes, oil and gas operations, large mining, and major industrial facilities. Category II includes projects that may require EIA depending on detailed screening, such as smaller industrial activities and medium-sized infrastructure. Category III projects are excluded from EIA, typically small-scale, low-impact, or routine activities. Initial Environmental Examination is sometimes used as an intermediate step for projects of uncertain significance, providing preliminary assessment that may lead to full EIA or exemption. Documentation of the screening decision is essential for transparency and accountability. The decision identifies the project, applicable criteria, screening outcome, and rationale. Appeals processes allow proponents or stakeholders to challenge screening decisions through administrative or judicial review. Best practice includes published screening guidelines, public access to screening decisions, and periodic review of categorisation thresholds to reflect current knowledge and priorities."}, {"title": "Discuss the use of GIS and remote sensing in EIA", "points": ["GIS for spatial analysis of impacts", "Remote sensing for baseline land cover, vegetation, change detection", "Habitat mapping", "Visualising stakeholder areas", "Cumulative impact analysis", "Monitoring change over time", "Communication tool", "Integration with EIA software"], "answer": "Geographic Information Systems (GIS) and remote sensing have transformed EIA practice, enabling spatial analysis at scales and resolutions previously impossible. GIS is computer-based software that captures, stores, manipulates, analyses, manages, and displays geographic data, while remote sensing acquires information about objects without physical contact, primarily through satellite or aircraft sensors. In EIA, GIS supports many tasks. Baseline mapping creates layered representations of the environment, combining topography, soil, vegetation, water resources, infrastructure, and human settlements. This baseline is essential for impact prediction and serves as the reference for monitoring. Spatial analysis of impacts overlays project footprints with sensitive features to identify potential conflicts. Buffer analysis quantifies populations or habitats within specified distances of pollutant sources. Network analysis assesses access to services and connectivity changes. GIS is particularly valuable for cumulative impact analysis, combining the effects of multiple projects across landscapes. Remote sensing supports baseline studies through high-resolution imagery showing current land use, vegetation cover, and water bodies. Historical imagery enables change detection over time, revealing degradation, expansion, or recovery. Specific applications include habitat mapping for biodiversity assessment, deforestation tracking, oil spill detection, urban growth analysis, and crop health monitoring. Monitoring during and after project implementation uses repeat imagery to verify mitigation effectiveness and detect emerging issues. GIS visualisation also serves as a powerful communication tool. Maps make technical information accessible to non-experts, supporting community engagement and stakeholder dialogue. Interactive web-based GIS allows broader public access to EIA information. Integration with other EIA tools is standard practice. Air dispersion modelling outputs are mapped in GIS, hydrological models incorporate spatial data, and biodiversity assessments use GIS-based habitat suitability models. Modern EIA software platforms increasingly embed GIS capabilities directly. Limitations include data quality and availability, especially in developing countries; cost of high-resolution imagery; technical capacity requirements; and the need to combine GIS analysis with field verification. As technology evolves with cheaper satellites, drones, and machine learning, GIS and remote sensing will further enhance EIA quality and accessibility."}];
const QUICK_REFERENCE = [{"category": "5 EIA Steps", "items": [{"label": "1", "desc": "Screening - is full EIA needed?"}, {"label": "2", "desc": "Scoping - critical issues, community participation"}, {"label": "3", "desc": "Prediction & Mitigation"}, {"label": "4", "desc": "Management & Monitoring (EIS)"}, {"label": "5", "desc": "Audit - feedback and learning"}]}, {"category": "6 HIA Stages", "items": [{"label": "1", "desc": "Screening"}, {"label": "2", "desc": "Scoping (steering group)"}, {"label": "3", "desc": "Appraisal (mixed methods)"}, {"label": "4", "desc": "Recommendations"}, {"label": "5", "desc": "Implementation"}, {"label": "6", "desc": "Monitoring & Evaluation"}]}, {"category": "4 HIA Core Values", "items": [{"label": "1", "desc": "Democracy"}, {"label": "2", "desc": "Equity"}, {"label": "3", "desc": "Sustainable Development"}, {"label": "4", "desc": "Ethical Use of Evidence"}]}, {"category": "4 EIA Decisions", "items": [{"label": "1", "desc": "Proceed without modification"}, {"label": "2", "desc": "Proceed with conditions"}, {"label": "3", "desc": "EIS unsatisfactory - new EIS"}, {"label": "4", "desc": "Do not proceed"}]}, {"category": "3 Functions of EIA", "items": [{"label": "Predict", "desc": "Identify problems early"}, {"label": "Avoid", "desc": "Find ways to prevent issues"}, {"label": "Enhance", "desc": "Maximise positive effects"}]}, {"category": "Mitigation Hierarchy", "items": [{"label": "1", "desc": "Avoid the impact"}, {"label": "2", "desc": "Minimise the impact"}, {"label": "3", "desc": "Restore/rehabilitate"}, {"label": "4", "desc": "Offset/compensate"}]}];

function App() {
  const [mode, setMode] = useState('home');
  const [topicFilter, setTopicFilter] = useState('All');
  const [questionIndex, setQuestionIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [shuffled, setShuffled] = useState(false);
  const [questionOrder, setQuestionOrder] = useState([]);
  const [flashIndex, setFlashIndex] = useState(0);
  const [flashFlipped, setFlashFlipped] = useState(false);
  const [flashOrder, setFlashOrder] = useState([]);
  const [essayIndex, setEssayIndex] = useState(0);
  const [revealedEssay, setRevealedEssay] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);

  const topics = ['All', ...new Set(MCQ_BANK.map(q => q.topic))];

  const filteredQuestions = useMemo(() => {
    if (topicFilter === 'All') return MCQ_BANK;
    return MCQ_BANK.filter(q => q.topic === topicFilter);
  }, [topicFilter]);

  const [optionMaps, setOptionMaps] = useState({});

  useEffect(() => {
    const order = filteredQuestions.map((_, i) => i);
    const maps = {};
    if (shuffled) {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      // Also shuffle option order within each question
      filteredQuestions.forEach((q, qi) => {
        const indices = q.options.map((_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        maps[qi] = indices;
      });
    } else {
      filteredQuestions.forEach((q, qi) => {
        maps[qi] = q.options.map((_, i) => i);
      });
    }
    setOptionMaps(maps);
    setQuestionOrder(order);
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  }, [topicFilter, shuffled, filteredQuestions]);

  useEffect(() => { setFlashOrder(FLASHCARDS.map((_, i) => i)); }, []);

  const currentQ = filteredQuestions[questionOrder[questionIndex]];
  const currentOptionMap = currentQ ? (optionMaps[questionOrder[questionIndex]] || currentQ.options.map((_, i) => i)) : [];

  const handleAnswer = (displayIdx) => {
    if (revealed) return;
    const realIdx = currentOptionMap[displayIdx];
    setSelected(displayIdx);
    setRevealed(true);
    setScore(s => ({ correct: s.correct + (realIdx === currentQ.correct ? 1 : 0), total: s.total + 1 }));
  };

  const nextQuestion = () => {
    if (questionIndex < questionOrder.length - 1) {
      setQuestionIndex(i => i + 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const prevQuestion = () => {
    if (questionIndex > 0) {
      setQuestionIndex(i => i - 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const restart = () => {
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  };

  const shuffleFlash = () => {
    const order = [...flashOrder];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    setFlashOrder(order);
    setFlashIndex(0);
    setFlashFlipped(false);
  };

  const currentFlash = FLASHCARDS[flashOrder[flashIndex]];
  const currentEssay = ESSAYS[essayIndex];

  return (
    <div className="min-h-screen text-stone-100" style={{ background: 'radial-gradient(ellipse at top, #2a1f17 0%, #1a1410 50%, #0f0c0a 100%)', fontFamily: '"Plus Jakarta Sans", -apple-system, sans-serif' }}>
      <div className="grain-overlay">
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10 relative" style={{ zIndex: 2 }}>

          <header className="mb-8 sm:mb-12 fade-in">
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px w-8 bg-amber-600/60"></div>
              <span className="text-xs uppercase tracking-[0.3em] text-amber-500/80">EHS 511 · Day 4</span>
            </div>
            <h1 className="display-font text-4xl sm:text-6xl font-medium leading-[0.95] mb-3" style={{ color: '#f5e8d0' }}>
              EIA / Health<br/>
              <span className="italic" style={{ color: '#d4a574' }}>Impact Assessment</span>
            </h1>
            <p className="text-stone-400 text-sm sm:text-base max-w-xl">Master the 5 EIA steps and 6 HIA stages. Predict, avoid, enhance.</p>
          </header>

          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mb-6 sm:mb-8">
            {[
              { id: 'home', label: 'Quiz', icon: Target, desc: MCQ_BANK.length + ' MCQs' },
              { id: 'flash', label: 'Flashcards', icon: Layers, desc: FLASHCARDS.length + ' cards' },
              { id: 'essay', label: 'Essays', icon: FileText, desc: ESSAYS.length + ' outlines' },
              { id: 'quick', label: 'Quick Ref', icon: BookOpen, desc: 'Drill cards' }
            ].map(m => {
              const I = m.icon;
              const active = mode === m.id;
              return (
                <button key={m.id} onClick={() => setMode(m.id)} className={`group relative p-3 sm:p-4 rounded-lg border transition-all text-left ${active ? 'border-amber-500/60 bg-amber-950/30' : 'border-stone-800 hover:border-stone-700 bg-stone-950/40'}`}>
                  <I size={18} className={active ? 'text-amber-400' : 'text-stone-400'} />
                  <div className={`mt-2 text-sm font-medium ${active ? 'text-amber-100' : 'text-stone-200'}`}>{m.label}</div>
                  <div className="text-[10px] sm:text-xs text-stone-500 mt-0.5">{m.desc}</div>
                </button>
              );
            })}
          </div>

          {mode === 'home' && currentQ && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4">
                <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                  <div className="flex items-center gap-3">
                    <div className="text-xs text-stone-500 uppercase tracking-wider">Question</div>
                    <div className="display-font text-2xl text-amber-400">{questionIndex + 1}<span className="text-stone-600">/{questionOrder.length}</span></div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="text-right">
                      <div className="text-xs text-stone-500 uppercase tracking-wider">Score</div>
                      <div className="display-font text-2xl">
                        <span style={{ color: score.total > 0 && score.correct/score.total >= 0.7 ? '#86efac' : '#d4a574' }}>{score.correct}</span>
                        <span className="text-stone-600">/{score.total}</span>
                      </div>
                    </div>
                    <button onClick={restart} className="p-2 hover:bg-stone-800 rounded transition-colors" title="Restart"><RotateCcw size={16} className="text-stone-400" /></button>
                    <button onClick={() => setShuffled(s => !s)} className={`p-2 rounded transition-colors ${shuffled ? 'bg-amber-950 text-amber-400' : 'hover:bg-stone-800 text-stone-400'}`} title="Shuffle"><Shuffle size={16} /></button>
                  </div>
                </div>
                <div className="h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-amber-700 to-amber-500 transition-all duration-500" style={{ width: `${((questionIndex + 1) / questionOrder.length) * 100}%` }}></div>
                </div>
                <div className="mt-4 flex flex-wrap gap-1.5">
                  {topics.map(t => (
                    <button key={t} onClick={() => setTopicFilter(t)} className={`text-[11px] px-2.5 py-1 rounded-full border transition-colors ${topicFilter === t ? 'border-amber-600 bg-amber-950/50 text-amber-200' : 'border-stone-800 text-stone-400 hover:border-stone-700'}`}>{t}</button>
                  ))}
                </div>
              </div>

              <div key={questionIndex} className="bg-stone-950/60 border border-stone-800 rounded-lg p-5 sm:p-7 scale-in">
                <div className="flex items-center gap-2 mb-4">
                  <span className="inline-flex items-center gap-1.5 text-[10px] uppercase tracking-[0.2em] text-amber-500/80 px-2 py-1 rounded-full bg-amber-950/30 border border-amber-900/40">
                    <Activity size={14} />
                    {currentQ.topic}
                  </span>
                </div>
                <h2 className="display-font text-xl sm:text-2xl text-stone-100 leading-snug mb-6">{currentQ.q}</h2>
                <div className="space-y-2">
                  {currentOptionMap.map((realIdx, displayIdx) => {
                    const opt = currentQ.options[realIdx];
                    const isCorrect = realIdx === currentQ.correct;
                    const isSelected = selected === displayIdx;
                    let cls = 'border-stone-800 hover:border-stone-700 bg-stone-900/30';
                    if (revealed) {
                      if (isCorrect) cls = 'border-emerald-700 bg-emerald-950/40 text-emerald-100';
                      else if (isSelected && !isCorrect) cls = 'border-rose-800 bg-rose-950/40 text-rose-200';
                      else cls = 'border-stone-800 bg-stone-950/30 opacity-50';
                    }
                    return (
                      <button key={displayIdx} onClick={() => handleAnswer(displayIdx)} disabled={revealed} className={`w-full text-left p-3 sm:p-4 rounded-lg border transition-all flex items-start gap-3 ${cls}`}>
                        <div className={`flex-shrink-0 w-7 h-7 rounded-full border flex items-center justify-center text-xs font-medium ${revealed && isCorrect ? 'border-emerald-600 bg-emerald-900 text-emerald-200' : revealed && isSelected && !isCorrect ? 'border-rose-700 bg-rose-900 text-rose-200' : 'border-stone-700 text-stone-400'}`}>
                          {revealed && isCorrect ? <Check size={14} /> : revealed && isSelected && !isCorrect ? <X size={14} /> : ['A','B','C','D'][displayIdx]}
                        </div>
                        <span className="text-sm sm:text-base pt-0.5">{opt}</span>
                      </button>
                    );
                  })}
                </div>
                {revealed && (
                  <div className="mt-5 p-4 bg-amber-950/20 border-l-2 border-amber-600/60 rounded-r-lg slide-right">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-1">Why</div>
                    <p className="text-sm text-stone-300 leading-relaxed">{currentQ.explain}</p>
                  </div>
                )}
                <div className="flex justify-between items-center mt-6">
                  <button onClick={prevQuestion} disabled={questionIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                    <ChevronLeft size={16} /> Previous
                  </button>
                  {questionIndex === questionOrder.length - 1 && revealed ? (
                    <div className="flex items-center gap-2 text-amber-400 text-sm">
                      <Trophy size={16} />
                      Final score: {score.correct}/{score.total}
                    </div>
                  ) : (
