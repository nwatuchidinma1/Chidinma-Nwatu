r records"], "correct": 1, "explain": "Always check scene safety first. A second casualty (you) helps no one."}, {"topic": "Foundations", "q": "Universal Precautions in first aid means:", "options": ["Treating only HIV patients with care", "Treating all blood and body fluids as potentially infectious", "Wearing gloves only when blood is visible", "Using one glove per casualty"], "correct": 1, "explain": "Universal Precautions: assume all blood and body fluids could be infectious."}, {"topic": "CPR", "q": "In CPR, the order is:", "options": ["ABC", "CAB", "ACB", "BCA"], "correct": 1, "explain": "For CPR specifically, the sequence flips to CAB: Compressions, Airway, Breathing."}, {"topic": "CPR", "q": "Standard adult CPR compression to breath ratio:", "options": ["15:2", "20:2", "30:2", "50:2"], "correct": 2, "explain": "30 compressions to 2 rescue breaths is one cycle."}, {"topic": "CPR", "q": "Recommended chest compression rate:", "options": ["60-80/min", "80-100/min", "100-120/min", "130-150/min"], "correct": 2, "explain": "100-120 per minute. Think the beat of 'Stayin Alive'."}, {"topic": "CPR", "q": "Adult chest compression depth:", "options": ["1 inch", "2 inches (5 cm)", "3 inches", "4 inches"], "correct": 1, "explain": "At least 2 inches (5 cm), no more than 2.4 inches (6 cm)."}, {"topic": "CPR", "q": "Brain damage from no oxygen begins after about:", "options": ["1 minute", "4 minutes", "10 minutes", "30 minutes"], "correct": 1, "explain": "About 4 minutes without oxygen and irreversible brain damage starts."}, {"topic": "CPR", "q": "To check responsiveness in an infant, you should:", "options": ["Tap the shoulder", "Shake vigorously", "Tap the heel of the foot", "Pour cold water"], "correct": 2, "explain": "Infants under 1 year: tap the heel of the foot."}, {"topic": "CPR", "q": "An AED is used to:", "options": ["Restart breathing", "Stop bleeding", "Shock the heart into normal rhythm", "Open the airway"], "correct": 2, "explain": "Automated External Defibrillator delivers controlled shock."}, {"topic": "CPR", "q": "Which is NOT a cause of cardiac arrest?", "options": ["Ventricular fibrillation", "Asystole", "Pulseless electrical activity", "Mild fever"], "correct": 3, "explain": "VF, VT, asystole, and PEA are the cardiac arrest rhythms. Mild fever is not."}, {"topic": "CPR", "q": "For infant CPR, compressions are done with:", "options": ["Both hands", "One hand heel", "Two fingers", "Thumb only"], "correct": 2, "explain": "Infants under 1: two fingers on lower half of breastbone."}, {"topic": "CPR", "q": "For child CPR (1 to puberty), compressions are:", "options": ["Two fingers", "One or two hands, lower half breastbone", "Both hands fully extended", "Knee on the chest"], "correct": 1, "explain": "Children: heel of one or both hands depending on size."}, {"topic": "CPR", "q": "Hands-only CPR is recommended for:", "options": ["Trained professionals only", "Untrained bystanders", "Drowning victims", "Infants only"], "correct": 1, "explain": "Hands-only is for the untrained or those uncomfortable with rescue breaths."}, {"topic": "CPR", "q": "Compressions should be delivered on:", "options": ["Soft mattress", "Firm surface", "Inclined plane", "Sand"], "correct": 1, "explain": "A firm surface ensures compressions are effective."}, {"topic": "CPR", "q": "Open-airway technique for adult CPR:", "options": ["Jaw thrust only", "Head-tilt, chin-lift", "Pull tongue out", "Tilt head forward"], "correct": 1, "explain": "Head-tilt, chin-lift opens the airway in standard CPR."}, {"topic": "CPR", "q": "Each rescue breath should last about:", "options": ["1 second", "3 seconds", "5 seconds", "10 seconds"], "correct": 0, "explain": "1 second per breath, watching for chest rise."}, {"topic": "CPR", "q": "After AED shock, what comes next?", "options": ["Stop and check pulse", "Resume CPR for 2 minutes", "Wait 5 minutes", "Give another shock"], "correct": 1, "explain": "Resume compressions immediately for 2 minutes before next shock check."}, {"topic": "CPR", "q": "Which is an AIM of CPR?", "options": ["Diagnose disease", "Restore effective circulation and ventilation", "Treat fractures", "Stop hemorrhage"], "correct": 1, "explain": "CPR aims include open airway, ventilation, circulation, restoration, prevention of brain damage."}, {"topic": "Choking", "q": "The Heimlich manoeuvre involves pressure between:", "options": ["Chest and abdomen", "Breastbone and navel", "Shoulder blades", "Ribs"], "correct": 1, "explain": "Place fist between breastbone and navel, thrust inward and upward."}, {"topic": "Choking", "q": "For infant choking, the correct approach is:", "options": ["Abdominal thrusts", "Heimlich manoeuvre", "Five back blows then five chest thrusts", "Mouth-to-mouth"], "correct": 2, "explain": "Infants: back blows + chest thrusts. NOT abdominal thrusts."}, {"topic": "Choking", "q": "How many cycles of back blows for infants per round?", "options": ["3", "5", "10", "15"], "correct": 1, "explain": "5 back blows then 5 chest thrusts per cycle."}, {"topic": "Choking", "q": "Heimlich technique direction of thrust:", "options": ["Downward", "Outward", "Inward and upward", "Horizontal"], "correct": 2, "explain": "Inward AND upward to expel object."}, {"topic": "Choking", "q": "Brain damage from total airway obstruction begins in roughly:", "options": ["1 minute", "5 minutes", "15 minutes", "30 minutes"], "correct": 1, "explain": "About 5 minutes of complete airway obstruction."}, {"topic": "Choking", "q": "For a conscious choking child under 5:", "options": ["Same as adult Heimlich", "Modified gentler abdominal thrusts", "Back blows only", "Do nothing"], "correct": 1, "explain": "Less force than adult Heimlich. Kneel beside the child."}, {"topic": "Choking", "q": "If a choking victim becomes unconscious, you should:", "options": ["Continue Heimlich", "Wait for help", "Begin CPR", "Slap their face"], "correct": 2, "explain": "Once unconscious, start CPR. Each compression may help expel the object."}, l fires."}, {"topic": "Burns", "q": "Class B fires involve:", "options": ["Wood/paper", "Liquids and gases", "Electrical", "Metals"], "correct": 1, "explain": "Class B = liquids and gases like propane, petrol."}, {"topic": "Burns", "q": "Class D fires involve:", "options": ["Solids", "Liquids", "Electrical", "Burning metals"], "correct": 3, "explain": "Class D = burning metals (less common)."}, {"topic": "Burns", "q": "Class A fires involve:", "options": ["Paper, wood, cloth, solids", "Liquids", "Electrical", "Metals"], "correct": 0, "explain": "Class A = ordinary combustible solids."}, {"topic": "Burns", "q": "First response to clothing on fire:", "options": ["Run", "Stop, Drop, Roll", "Apply ice", "Call emergency immediately"], "correct": 1, "explain": "Stop, Drop, Roll smothers the flames."}, {"topic": "Burns", "q": "Which should NOT be applied to a fresh burn?", "options": ["Cool running water", "Sterile dressing", "Toothpaste or palm oil", "Plastic wrap"], "correct": 2, "explain": "No toothpaste, palm oil, butter. Use only cool water."}, {"topic": "Burns", "q": "Burns should be cooled with:", "options": ["Ice", "Room-temperature water 10-20 mins", "Hot water", "Alcohol"], "correct": 1, "explain": "Room-temp water for 10-20 mins. Ice damages tissue."}, {"topic": "Burns", "q": "Rhabdomyolysis is a complication of severe burns. It involves:", "options": ["Muscle breakdown releasing myoglobin into blood, harming kidneys", "Bone fracture", "Lung infection", "Mental confusion"], "correct": 0, "explain": "Muscle breakdown releases myoglobin which damages kidneys."}, {"topic": "Burns", "q": "Burn blisters should be:", "options": ["Burst immediately", "Left intact - they protect from infection", "Covered in oil", "Rubbed vigorously"], "correct": 1, "explain": "Don't pop blisters. They serve as a sterile barrier."}, {"topic": "Burns", "q": "Eschars in severe burns can:", "options": ["Heal quickly", "Compress limbs/chest causing further injury", "Reduce pain", "Stop bleeding"], "correct": 1, "explain": "Thick crusty surfaces can constrict and cause damage."}, {"topic": "Burns", "q": "A burn larger than the victim's palm should be:", "options": ["Treated at home", "Wrapped tightly", "Referred to hospital", "Ignored"], "correct": 2, "explain": "Palm rule: bigger than palm needs medical attention."}, {"topic": "Drowning", "q": "Drowning resuscitation order:", "options": ["Standard CPR (compressions first)", "Rescue breathing before chest compressions", "Chest compressions only", "Mouth-to-nose only"], "correct": 1, "explain": "Drowning is unique. Rescue breaths come BEFORE compressions."}, {"topic": "Drowning", "q": "Dry drowning:", "options": ["Drowning in sand", "Vocal cord spasm prevents water entry but blocks breathing", "Desert death", "Hours later"], "correct": 1, "explain": "Vocal cord spasm blocks airway without water entering lungs."}, {"topic": "Drowning", "q": "Globally, drowning is:", "options": ["Top 50 cause of accidental death", "Top 10 cause of accidental death", "Most common death", "Rarely fatal"], "correct": 1, "explain": "Drowning is in the top 10 causes of accidental death globally."}, {"topic": "Drowning", "q": "What percentage of drowning victims over 1 are male?", "options": ["20%", "50%", "80%", "100%"], "correct": 2, "explain": "About 80% of drowning victims over 1 year are male."}, {"topic": "Drowning", "q": "Children with seizures have how much higher drowning risk?", "options": ["2x", "5x", "20x", "100x"], "correct": 2, "explain": "20 times greater drowning risk in seizure patients."}, {"topic": "Drowning", "q": "Cyanosis after drowning means:", "options": ["Excellent oxygenation", "Blue skin from low oxygen", "Heat stroke", "Bleeding"], "correct": 1, "explain": "Cyanosis = blue tinge from low blood oxygen."}, {"topic": "Drowning", "q": "For a drowning rescue with possible spinal injury:", "options": ["Move neck freely", "Move neck as little as possible", "Twist the head", "Apply traction"], "correct": 1, " const FLASHCARDS = [{"term": "First Aid", "def": "Initial care given to a sick or injured person by a non-expert before professional medical help arrives."}, {"term": "3 Ps of First Aid", "def": "Preserve life, Prevent the condition from worsening, Promote recovery."}, {"term": "ABCs", "def": "Airway, Breathing, Circulation. Standard assessment for unconscious casualty."}, {"term": "ABCDE", "def": "Airway, Breathing, Circulation, Disability, Examination/Exposure. The full primary survey."}, {"term": "CAB", "def": "Compressions, Airway, Breathing. Specifically for CPR sequencing."}, {"term": "CPR Ratio", "def": "30 chest compressions to 2 rescue breaths = 1 cycle."}, {"term": "Compression Rate", "def": "100-120 per minute. Beat of Stayin Alive."}, {"term": "Compression Depth (Adult)", "def": "At least 2 inches (5 cm), no more than 2.4 inches (6 cm)."}, {"term": "Compression Depth (Infant)", "def": "About 1.5 inches (4 cm), using two fingers."}, {"term": "AED", "def": "Automated External Defibrillator. Delivers a controlled shock to restore normal heart rhythm."}, {"term": "Heimlich Manoeuvre", "def": "Abdominal thrusts between breastbone and navel for choking adults and children over 5."}, {"term": "Infant Choking", "def": "5 back blows then 5 chest thrusts. NOT abdominal thrusts."}, {"term": "Capillary Bleeding", "def": "Trickle of dark red blood. Smallest vessels. Often self-limits."}, {"term": "Venous Bleeding", "def": "Steady flow, dark red. Mild to severe."}, {"term": "Arterial Bleeding", "def": "Bright red, spurting. Severe rapid blood loss."}, {"term": "Direct Pressure", "def": "First-line bleeding control - press cloth firmly on wound."}, {"term": "Tourniquet Placement", "def": "2-3 inches above the wound (never on it). Note application time."}, {"term": "Hemostatic Dressing", "def": "Wound dressing with kaolin/chitosan that promotes rapid clotting. Used when direct pressure fails."}, {"term": "First-Degree Burn", "def": "Superficial. Epidermis only. Red, painful, no blisters."}, {"term": "Second-Degree Burn", "def": "Partial-thickness. Epidermis + dermis. Blisters in 24 hrs, very painful."}, {"term": "Third-Degree Burn", "def": "Full-thickness. All 3 layers + nerves. Leathery, often painless."}, {"term": "Class A Fire", "def": "Paper, wood, cloth, combustible solids."}, {"term": "Class B Fire", "def": "Liquids and gases (propane, petrol)."}, {"term": "Class C Fire", "def": "Electrical fires."}, {"term": "Class D Fire", "def": "Burning metals (less common)."}, {"term": "Class K Fire", "def": "Kitchen fires (grease, oil). Most common at home."}, {"term": "Burn Treatment Steps", "def": "Stop source, cool with room-temp water 10-20 mins, remove tight items, sterile dressing, refer if serious."}, {"term": "Stop Drop Roll", "def": "For person on fire. Smothers flames by depriving oxygen."}, {"term": "Drowning Resuscitation", "def": "Rescue breathing FIRST, then chest compressions. Unique to drowning."}, {"term": "Dry Drowning", "def": "Vocal cord spasm prevents water entering lungs but blocks breathing."}, {"term": "IgE", "def": "The antibody class mediating allergic reactions. Binds mast cells, releases histamine."}, {"term": "Anaphylaxis", "def": "Sudden, life-threatening allergic reaction. Onset within 15 min usually."}, {"term": "Anaphylaxis Triggers", "def": "Drugs (especially penicillin), insect stings, foods (eggs, seafood, nuts), latex."}, {"term": "Anaphylaxis Treatment", "def": "Epinephrine first. Then breathing tube if needed, IV fluids, antihistamines, beta-agonists, corticosteroids."}, {"term": "Anaphylactoid Reaction", "def": "Looks like anaphylaxis but NOT IgE-mediated. Can occur on first exposure."}, {"term": "Urticaria", "def": "Hives - small red wheals on skin. Type I hypersensitivity."}, {"term": "Angioedema", "def": "Deeper tissue swelling. Dangerous in throat/airways."}, {"term": "EpiPen", "def": "Auto-injector device delivering epinephrine for anaphylaxis emergency."}, {"term": "Snake Bite Don'ts", "def": "NOT cut, suck venom, apply ice, or use tight tourniquet."}, {"term": "Dog Bite Wash Time", "def": "At least 10 minutes with soap and running water. Refer for rabies and tetanus."}, {"term": "FAST (Stroke)", "def": "Face droop, Arm weakness, Speech slurred, Time to call emergency."}, {"term": "Order of Priorities", "def": "Breathing > Bleeding > Bones in trauma care."}, {"term": "RICE", "def": "Rest, Ice, Compression, Elevation. For sprains and soft tissue."}, {"term": "Recovery Position", "def": "Side-lying for unconscious but breathing casualty. Keeps airway open."}, {"term": "Universal Precautions", "def": "Treat ALL blood and body fluids as potentially infectious regardless of diagnosis."}, {"term": "Bloodborne Pathogens", "def": "HBV (Hepatitis B), HCV (Hepatitis C), HIV."}, {"term": "Hand Wash Duration", "def": "40-60 seconds with soap. 20-30 seconds for alcohol rub."}, {"term": "OSHA", "def": "Occupational Safety and Health Administration. US federal workplace safety agency."}, {"term": "Workers Comp Mod", "def": "Experience modification. Compares company accident rate to industry over 3 years. Affects insurance."}, {"term": "Soil Suction Radon System", "def": "Vent pipe and fan that pulls radon gas from beneath house and vents outside."}];

const QUICK_REFERENCE = [{"category": "Critical Numbers", "items": [{"label": "30:2", "desc": "Compressions to rescue breaths"}, {"label": "100-120", "desc": "Compressions per minute"}, {"label": "5 cm", "desc": "Adult compression depth"}, {"label": "4 min", "desc": "Brain damage onset"}, {"label": "5 min", "desc": "Total airway block damage"}, {"label": "40-60 sec", "desc": "Hand washing"}, {"label": "20-30 sec", "desc": "Alcohol hand rub"}, {"label": "1 m", "desc": "Respiratory patient spacing"}, {"label": "6 ft / 2 m", "desc": "Conference distancing"}, {"label": "10 min", "desc": "Dog bite wash time"}, {"label": "15 min", "desc": "Anaphylaxis onset"}, {"label": "10-20 min", "desc": "Burn cooling time"}, {"label": "2-3 in", "desc": "Tourniquet above wound"}, {"label": "3-5 min", "desc": "Hemostatic dressing pressure"}]}, {"category": "Mnemonics", "items": [{"label": "3 Ps", "desc": "Preserve, Prevent, Promote"}, {"label": "ABCDE", "desc": "Airway, Breathing, Circulation, Disability, Exam"}, {"label": "CAB", "desc": "Compressions, Airway, Breathing (CPR)"}, {"label": "FAST", "desc": "Face, Arm, Speech, Time (stroke)"}, {"label": "RICE", "desc": "Rest, Ice, Compression, Elevation"}, {"label": "Stop Drop Roll", "desc": "Person on fire"}, {"label": "B>B>B", "desc": "Breathing > Bleeding > Bones"}]}, {"category": "Fire Classes", "items": [{"label": "A", "desc": "Paper, wood, cloth, solids"}, {"label": "B", "desc": "Liquids, gases (propane, petrol)"}, {"label": "C", "desc": "Electrical fires"}, {"label": "D", "desc": "Burning metals (rare)"}, {"label": "K", "desc": "Kitchen (grease, oil) - most common"}]}, {"category": "Burn Degrees", "items": [{"label": "1st", "desc": "Epidermis only. Red, no blisters"}, {"label": "2nd", "desc": "Epidermis + dermis. Blisters in 24h, very painful"}, {"label": "3rd", "desc": "All layers + nerves. Leathery, often painless"}]}, {"category": "Bleeding Types", "items": [{"label": "Capillary", "desc": "Trickle, dark red. Mild"}, {"label": "Venous", "desc": "Steady flow, dark red"}, {"label": "Arterial", "desc": "Bright red, spurting. Severe"}]}];

function App() {
  const [mode, setMode] = useState('home');
  const [topicFilter, setTopicFilter] = useState('All');
  const [questionIndex, setQuestionIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [shuffled, setShuffled] = useState(false);
  const [questionOrder, setQuestionOrder] = useState([]);
  const [flashIndex, setFlashIndex] = useState(0);
  const [flashFlipped, setFlashFlipped] = useState(false);
  const [flashOrder, setFlashOrder] = useState([]);
  const [essayIndex, setEssayIndex] = useState(0);
  const [revealedEssay, setRevealedEssay] = useState(false);

  const topics = ['All', ...new Set(MCQ_BANK.map(q => q.topic))];

  const filteredQuestions = useMemo(() => {
    if (topicFilter === 'All') return MCQ_BANK;
    return MCQ_BANK.filter(q => q.topic === topicFilter);
  }, [topicFilter]);

  useEffect(() => {
    const order = filteredQuestions.map((_, i) => i);
    if (shuffled) {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
    }
    setQuestionOrder(order);
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  }, [topicFilter, shuffled, filteredQuestions]);

  useEffect(() => { setFlashOrder(FLASHCARDS.map((_, i) => i)); }, []);

  const currentQ = filteredQuestions[questionOrder[questionIndex]];

  const handleAnswer = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    setScore(s => ({ correct: s.correct + (idx === currentQ.correct ? 1 : 0), total: s.total + 1 }));
  };

  const nextQuestion = () => {
    if (questionIndex < questionOrder.length - 1) {
      setQuestionIndex(i => i + 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const prevQuestion = () => {
    if (questionIndex > 0) {
      setQuestionIndex(i => i - 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const restart = () => {
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  };

  const shuffleFlash = () => {
    const order = [...flashOrder];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    setFlashOrder(order);
    setFlashIndex(0);
    setFlashFlipped(false);
  };

  const currentFlash = FLASHCARDS[flashOrder[flashIndex]];
  const currentEssay = ESSAYS[essayIndex];

  return (
    <div className="min-h-screen text-stone-100" style={{ background: 'radial-gradient(ellipse at top, #2a1f17 0%, #1a1410 50%, #0f0c0a 100%)', fontFamily: '"Plus Jakarta Sans", -apple-system, sans-serif' }}>
      <div className="grain-overlay">
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10 relative" style={{ zIndex: 2 }}>

          <header className="mb-8 sm:mb-12 fade-in">
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px w-8 bg-amber-600/60"></div>
              <span className="text-xs uppercase tracking-[0.3em] text-amber-500/80">EHS 515 · Day 1</span>
            </div>
            <h1 className="display-font text-4xl sm:text-6xl font-medium leading-[0.95] mb-3" style={{ color: '#f5e8d0' }}>
              Emergency<br/>
              <span className="italic" style={{ color: '#d4a574' }}>Medical Care</span>
            </h1>
            <p className="text-stone-400 text-sm sm:text-base max-w-xl">Your study companion for Saturday's exam. Quiz to test, flashcards to memorise, essays to plan, quick ref to drill.</p>
          </header>

          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mb-6 sm:mb-8">
            {[
              { id: 'home', label: 'Quiz', icon: Target, desc: MCQ_BANK.length + ' MCQs' },
              { id: 'flash', label: 'Flashcards', icon: Layers, desc: FLASHCARDS.length + ' cards' },
              { id: 'essay', label: 'Essays', icon: FileText, desc: ESSAYS.length + ' outlines' },
              { id: 'quick', label: 'Quick Ref', icon: BookOpen, desc: 'Drill cards' }
            ].map(m => {
              const I = m.icon;
              const active = mode === m.id;
              return (
                <button key={m.id} onClick={() => setMode(m.id)} className={`group relative p-3 sm:p-4 rounded-lg border transition-all text-left ${active ? 'border-amber-500/60 bg-amber-950/30' : 'border-stone-800 hover:border-stone-700 bg-stone-950/40'}`}>
                  <I size={18} className={active ? 'text-amber-400' : 'text-stone-400'} />
                  <div className={`mt-2 text-sm font-medium ${active ? 'text-amber-100' : 'text-stone-200'}`}>{m.label}</div>
                  <div className="text-[10px] sm:text-xs text-stone-500 mt-0.5">{m.desc}</div>
                </button>
              );
            })}
          </div>

          {mode === 'home' && currentQ && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4">
                <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                  <div className="flex items-center gap-3">
                    <div className="text-xs text-stone-500 uppercase tracking-wider">Question</div>
                    <div className="display-font text-2xl text-amber-400">{questionIndex + 1}<span className="text-stone-600">/{questionOrder.length}</span></div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="text-right">
                      <div className="text-xs text-stone-500 uppercase tracking-wider">Score</div>
                      <div className="display-font text-2xl">
                        <span style={{ color: score.total > 0 && score.correct/score.total >= 0.7 ? '#86efac' : '#d4a574' }}>{score.correct}</span>
                        <span className="text-stone-600">/{score.total}</span>
                      </div>
                    </div>
                    <button onClick={restart} className="p-2 hover:bg-stone-800 rounded transition-colors" title="Restart"><RotateCcw size={16} className="text-stone-400" /></button>
                    <button onClick={() => setShuffled(s => !s)} className={`p-2 rounded transition-colors ${shuffled ? 'bg-amber-950 text-amber-400' : 'hover:bg-stone-800 text-stone-400'}`} title="Shuffle"><Shuffle size={16} /></button>
                  </div>
                </div>
                <div className="h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-amber-700 to-amber-500 transition-all duration-500" style={{ width: `${((questionIndex + 1) / questionOrder.length) * 100}%` }}></div>
                </div>
                <div className="mt-4 flex flex-wrap gap-1.5">
                  {topics.map(t => (
                    <button key={t} onClick={() => setTopicFilter(t)} className={`text-[11px] px-2.5 py-1 rounded-full border transition-colors ${topicFilter === t ? 'border-amber-600 bg-amber-950/50 text-amber-200' : 'border-stone-800 text-stone-400 hover:border-stone-700'}`}>{t}</button>
                  ))}
                </div>
              </div>

              <div key={questionIndex} className="bg-stone-950/60 border border-stone-800 rounded-lg p-5 sm:p-7 scale-in">
                <div className="flex items-center gap-2 mb-4">
                  <span className="inline-flex items-center gap-1.5 text-[10px] uppercase tracking-[0.2em] text-amber-500/80 px-2 py-1 rounded-full bg-amber-950/30 border border-amber-900/40">
                    <Activity size={14} />
                    {currentQ.topic}
                  </span>
                </div>
                <h2 className="display-font text-xl sm:text-2xl text-stone-100 leading-snug mb-6">{currentQ.q}</h2>
                <div className="space-y-2">
                  {currentQ.options.map((opt, i) => {
                    const isCorrect = i === currentQ.correct;
                    const isSelected = selected === i;
                    let cls = 'border-stone-800 hover:border-stone-700 bg-stone-900/30';
                    if (revealed) {
                      if (isCorrect) cls = 'border-emerald-700 bg-emerald-950/40 text-emerald-100';
                      else if (isSelected && !isCorrect) cls = 'border-rose-800 bg-rose-950/40 text-rose-200';
                      else cls = 'border-stone-800 bg-stone-950/30 opacity-50';
                    }
                    return (
                      <button key={i} onClick={() => handleAnswer(i)} disabled={revealed} className={`w-full text-left p-3 sm:p-4 rounded-lg border transition-all flex items-start gap-3 ${cls}`}>
                        <div className={`flex-shrink-0 w-7 h-7 rounded-full border flex items-center justify-center text-xs font-medium ${revealed && isCorrect ? 'border-emerald-600 bg-emerald-900 text-emerald-200' : revealed && isSelected && !isCorrect ? 'border-rose-700 bg-rose-900 text-rose-200' : 'border-stone-700 text-stone-400'}`}>
                          {revealed && isCorrect ? <Check size={14} /> : revealed && isSelected && !isCorrect ? <X size={14} /> : ['A','B','C','D'][i]}
                        </div>
                        <span className="text-sm sm:text-base pt-0.5">{opt}</span>
                      </button>
                    );
                  })}
                </div>
                {revealed && (
                  <div className="mt-5 p-4 bg-amber-950/20 border-l-2 border-amber-600/60 rounded-r-lg slide-right">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-1">Why</div>
                    <p className="text-sm text-stone-300 leading-relaxed">{currentQ.explain}</p>
                  </div>
                )}
                <div className="flex justify-between items-center mt-6">
                  <button onClick={prevQuestion} disabled={questionIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                    <ChevronLeft size={16} /> Previous
                  </button>
                  {questionIndex === questionOrder.length - 1 && revealed ? (
                    <div className="flex items-center gap-2 text-amber-400 text-sm">
                      <Trophy size={16} />
                      Final score: {score.correct}/{score.total}
                    </div>
                  ) : (
                    <button onClick={nextQuestion} disabled={!revealed || questionIndex === questionOrder.length - 1} className="flex items-center gap-1.5 px-4 py-2 bg-amber-700 hover:bg-amber-600 disabled:opacity-30 disabled:cursor-not-allowed text-stone-50 rounded-md text-sm font-medium transition-colors">
                      Next <ChevronRight size={16} />
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          {mode === 'flash' && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
                <div>
                  <div className="text-xs text-stone-500 uppercase tracking-wider">Card</div>
                  <div className="display-font text-2xl text-amber-400">{flashIndex + 1}<span className="text-stone-600">/{FLASHCARDS.length}</span></div>
                </div>
                <button onClick={shuffleFlash} className="flex items-center gap-1.5 px-3 py-2 text-stone-300 hover:text-amber-400 border border-stone-800 hover:border-amber-700 rounded-md text-sm transition-colors">
                  <Shuffle size={14} /> Shuffle
                </button>
              </div>
              <div key={flashIndex} onClick={() => setFlashFlipped(f => !f)} className="bg-gradient-to-br from-stone-900 to-stone-950 border border-stone-800 rounded-lg p-7 sm:p-12 min-h-[280px] sm:min-h-[340px] flex items-center justify-center cursor-pointer hover:border-amber-700/60 transition-colors scale-in">
                <div className="text-center max-w-2xl">
                  {!flashFlipped ? (
                    <>
                      <div className="text-xs uppercase tracking-[0.3em] text-amber-500/70 mb-4">Term</div>
                      <h2 className="display-font text-3xl sm:text-4xl font-medium text-stone-100 mb-4">{currentFlash.term}</h2>
                      <p className="text-xs text-stone-500 mt-6 italic">tap to reveal</p>
                    </>
                  ) : (
                    <>
                      <div className="text-xs uppercase tracking-[0.3em] text-amber-500/70 mb-4">Definition</div>
                      <p className="text-base sm:text-lg text-stone-200 leading-relaxed">{currentFlash.def}</p>
                      <p className="text-xs text-stone-500 mt-6 italic">tap to flip back</p>
                    </>
                  )}
                </div>
              </div>
              <div className="flex justify-between items-center mt-4">
                <button onClick={() => { setFlashIndex(i => Math.max(0, i-1)); setFlashFlipped(false); }} disabled={flashIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  <ChevronLeft size={16} /> Previous
                </button>
                <div className="flex-1 mx-4 h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-amber-700 to-amber-500" style={{ width: `${((flashIndex + 1) / FLASHCARDS.length) * 100}%` }}></div>
                </div>
                <button onClick={() => { setFlashIndex(i => Math.min(FLASHCARDS.length-1, i+1)); setFlashFlipped(false); }} disabled={flashIndex === FLASHCARDS.length-1} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  Next <ChevronRight size={16} />
                </button>
              </div>
            </div>
          )}

          {mode === 'essay' && currentEssay && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4 flex items-center justify-between">
                <div>
                  <div className="text-xs text-stone-500 uppercase tracking-wider">Essay</div>
                  <div className="display-font text-2xl text-amber-400">{essayIndex + 1}<span className="text-stone-600">/{ESSAYS.length}</span></div>
                </div>
                <button onClick={() => setRevealedEssay(r => !r)} className="text-xs px-3 py-1.5 border border-stone-800 hover:border-amber-700 rounded-md text-stone-300 hover:text-amber-400 transition-colors">
                  {revealedEssay ? 'Hide outline' : 'Reveal outline'}
                </button>
              </div>
              <div key={essayIndex} className="bg-stone-950/60 border border-stone-800 rounded-lg p-6 sm:p-8 scale-in">
                <h2 className="display-font text-xl sm:text-2xl text-stone-100 leading-snug mb-6 italic">{currentEssay.title}</h2>
                {revealedEssay ? (
                  <div className="space-y-3 slide-right">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-2">Skeleton outline</div>
                    {currentEssay.points.map((pt, i) => (
                      <div key={i} className="flex gap-3 items-start">
                        <div className="flex-shrink-0 w-6 h-6 rounded-full border border-amber-700/50 text-amber-400 text-xs flex items-center justify-center mt-0.5">{i+1}</div>
                        <p className="text-sm text-stone-300 leading-relaxed pt-0.5">{pt}</p>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-6">
                    <p className="text-stone-500 italic mb-1">Try drafting your own outline first.</p>
                    <p className="text-stone-600 text-sm">Then reveal to compare.</p>
                  </div>
                )}
              </div>
              <div className="flex justify-between items-center mt-4">
                <button onClick={() => { setEssayIndex(i => Math.max(0, i-1)); setRevealedEssay(false); }} disabled={essayIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  <ChevronLeft size={16} /> Previous
                </button>
                <button onClick={() => { setEssayIndex(i => Math.min(ESSAYS.length-1, i+1)); setRevealedEssay(false); }} disabled={essayIndex === ESSAYS.length-1} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  Next <ChevronRight size={16} />
                </button>
              </div>
            </div>
          )}

          {mode === 'quick' && (
            <div className="fade-in space-y-6">
              {QUICK_REFERENCE.map(section => (
                <div key={section.category} className="bg-stone-950/60 border border-stone-800 rounded-lg p-5 sm:p-7">
                  <div className="flex items-center gap-2 mb-5">
                    <div className="h-px flex-1 bg-stone-800"></div>
                    <h3 className="display-font text-lg italic text-amber-400 px-3">{section.category}</h3>
                    <div className="h-px flex-1 bg-stone-800"></div>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-2 sm:gap-3">
                    {section.items.map((item, i) => (
                      <div key={i} className="flex items-start gap-3 p-3 rounded-md border border-stone-800/50 bg-stone-900/30 hover:border-amber-800/50 hover:bg-amber-950/10 transition-colors">
                        <div className="display-font font-medium text-amber-300 text-base sm:text-lg flex-shrink-0 min-w-[60px]">{item.label}</div>
                        <p className="text-xs sm:text-sm text-stone-300 pt-1">{item.desc}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          <footer className="mt-12 pt-6 border-t border-stone-900 text-center">
            <p className="text-xs text-stone-600 italic display-font">EHS 515 · Day 1 · Made by Chidinma Nwatu (The Revolutionary Educator)</p>
          </footer>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
document.getElementById('loading').classList.add('hidden');
</script>
</body>
</html>
