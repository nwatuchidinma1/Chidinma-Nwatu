function App() {
  const [mode, setMode] = useState('home');
  const [topicFilter, setTopicFilter] = useState('All');
  const [questionIndex, setQuestionIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [shuffled, setShuffled] = useState(false);
  const [questionOrder, setQuestionOrder] = useState([]);
  const [flashIndex, setFlashIndex] = useState(0);
  const [flashFlipped, setFlashFlipped] = useState(false);
  const [flashOrder, setFlashOrder] = useState([]);
  const [essayIndex, setEssayIndex] = useState(0);
  const [revealedEssay, setRevealedEssay] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);

  const topics = ['All', ...new Set(MCQ_BANK.map(q => q.topic))];

  const filteredQuestions = useMemo(() => {
    if (topicFilter === 'All') return MCQ_BANK;
    return MCQ_BANK.filter(q => q.topic === topicFilter);
  }, [topicFilter]);

  const [optionMaps, setOptionMaps] = useState({});

  useEffect(() => {
    const order = filteredQuestions.map((_, i) => i);
    const maps = {};
    if (shuffled) {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      // Also shuffle option order within each question
      filteredQuestions.forEach((q, qi) => {
        const indices = q.options.map((_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        maps[qi] = indices;
      });
    } else {
      filteredQuestions.forEach((q, qi) => {
        maps[qi] = q.options.map((_, i) => i);
      });
    }
    setOptionMaps(maps);
    setQuestionOrder(order);
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  }, [topicFilter, shuffled, filteredQuestions]);

  useEffect(() => { setFlashOrder(FLASHCARDS.map((_, i) => i)); }, []);

  const currentQ = filteredQuestions[questionOrder[questionIndex]];
  const currentOptionMap = currentQ ? (optionMaps[questionOrder[questionIndex]] || currentQ.options.map((_, i) => i)) : [];

  const handleAnswer = (displayIdx) => {
    if (revealed) return;
    const realIdx = currentOptionMap[displayIdx];
    setSelected(displayIdx);
    setRevealed(true);
    setScore(s => ({ correct: s.correct + (realIdx === currentQ.correct ? 1 : 0), total: s.total + 1 }));
  };

  const nextQuestion = () => {
    if (questionIndex < questionOrder.length - 1) {
      setQuestionIndex(i => i + 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const prevQuestion = () => {
    if (questionIndex > 0) {
      setQuestionIndex(i => i - 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const restart = () => {
    setQuestionIndex(0);
    setSelected(null);
    setRevealed(false);
    setScore({ correct: 0, total: 0 });
  };

  const shuffleFlash = () => {
    const order = [...flashOrder];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    setFlashOrder(order);
    setFlashIndex(0);
    setFlashFlipped(false);
  };

    <div className="min-h-screen text-stone-100" style={{ background: 'radial-gradient(ellipse at top, #2a1f17 0%, #1a1410 50%, #0f0c0a 100%)', fontFamily: '"Plus Jakarta Sans", -apple-system, sans-serif' }}>

                      </div>
                    </div>
                    <button onClick={restart} className="p-2 hover:bg-stone-800 rounded transition-colors" title="Restart"><RotateCcw size={16} className="text-stone-400" /></button>
                    <button onClick={() => setShuffled(s => !s)} className={`p-2 rounded transition-colors ${shuffled ? 'bg-amber-950 text-amber-400' : 'hover:bg-stone-800 text-stone-400'}`} title="Shuffle"><Shuffle size={16} /></button>
                  </div>
                </div>
                <div className="h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-amber-700 to-amber-500 transition-all duration-500" style={{ width: `${((questionIndex + 1) / questionOrder.length) * 100}%` }}></div>
                </div>
                <div className="mt-4 flex flex-wrap gap-1.5">
                  {topics.map(t => (
                    <button key={t} onClick={() => setTopicFilter(t)} className={`text-[11px] px-2.5 py-1 rounded-full border transition-colors ${topicFilter === t ? 'border-amber-600 bg-amber-950/50 text-amber-200' : 'border-stone-800 text-stone-400 hover:border-stone-700'}`}>{t}</button>
                  ))}
                </div>
              </div>

              <div key={questionIndex} className="bg-stone-950/60 border border-stone-800 rounded-lg p-5 sm:p-7 scale-in">
                <div className="flex items-center gap-2 mb-4">
                  <span className="inline-flex items-center gap-1.5 text-[10px] uppercase tracking-[0.2em] text-amber-500/80 px-2 py-1 rounded-full bg-amber-950/30 border border-amber-900/40">
                    <Activity size={14} />
                    {currentQ.topic}
                  </span>
                </div>
                <h2 className="display-font text-xl sm:text-2xl text-stone-100 leading-snug mb-6">{currentQ.q}</h2>
                <div className="space-y-2">
                  {currentOptionMap.map((realIdx, displayIdx) => {
                    const opt = currentQ.options[realIdx];
                    const isCorrect = realIdx === currentQ.correct;
                    const isSelected = selected === displayIdx;
                    let cls = 'border-stone-800 hover:border-stone-700 bg-stone-900/30';
                    if (revealed) {
                      if (isCorrect) cls = 'border-emerald-700 bg-emerald-950/40 text-emerald-100';
                      else if (isSelected && !isCorrect) cls = 'border-rose-800 bg-rose-950/40 text-rose-200';
                      else cls = 'border-stone-800 bg-stone-950/30 opacity-50';
                    }
                    return (
                      <button key={displayIdx} onClick={() => handleAnswer(displayIdx)} disabled={revealed} className={`w-full text-left p-3 sm:p-4 rounded-lg border transition-all flex items-start gap-3 ${cls}`}>
                        <div className={`flex-shrink-0 w-7 h-7 rounded-full border flex items-center justify-center text-xs font-medium ${revealed && isCorrect ? 'border-emerald-600 bg-emerald-900 text-emerald-200' : revealed && isSelected && !isCorrect ? 'border-rose-700 bg-rose-900 text-rose-200' : 'border-stone-700 text-stone-400'}`}>
                          {revealed && isCorrect ? <Check size={14} /> : revealed && isSelected && !isCorrect ? <X size={14} /> : ['A','B','C','D'][displayIdx]}
                        </div>
                        <span className="text-sm sm:text-base pt-0.5">{opt}</span>
                      </button>
                    );
                  })}
                </div>
                {revealed && (
                  <div className="mt-5 p-4 bg-amber-950/20 border-l-2 border-amber-600/60 rounded-r-lg slide-right">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-1">Why</div>
                    <p className="text-sm text-stone-300 leading-relaxed">{currentQ.explain}</p>
                  </div>
                )}
                <div className="flex justify-between items-center mt-6">
                  <button onClick={prevQuestion} disabled={questionIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                    <ChevronLeft size={16} /> Previous
                  </button>
                  {questionIndex === questionOrder.length - 1 && revealed ? (
                    <div className="flex items-center gap-2 text-amber-400 text-sm">
                      <Trophy size={16} />
                      Final score: {score.correct}/{score.total}
                    </div>
                  ) : (
                    <button onClick={nextQuestion} disabled={!revealed || questionIndex === questionOrder.length - 1} className="flex items-center gap-1.5 px-4 py-2 bg-amber-700 hover:bg-amber-600 disabled:opacity-30 disabled:cursor-not-allowed text-stone-50 rounded-md text-sm font-medium transition-colors">
                      Next <ChevronRight size={16} />
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          {mode === 'flash' && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
                <div>
                  <div className="text-xs text-stone-500 uppercase tracking-wider">Card</div>
                  <div className="display-font text-2xl text-amber-400">{flashIndex + 1}<span className="text-stone-600">/{FLASHCARDS.length}</span></div>
                </div>
                <button onClick={shuffleFlash} className="flex items-center gap-1.5 px-3 py-2 text-stone-300 hover:text-amber-400 border border-stone-800 hover:border-amber-700 rounded-md text-sm transition-colors">
                  <Shuffle size={14} /> Shuffle
                </button>
              </div>
              <div key={flashIndex} onClick={() => setFlashFlipped(f => !f)} className="bg-gradient-to-br from-stone-900 to-stone-950 border border-stone-800 rounded-lg p-7 sm:p-12 min-h-[280px] sm:min-h-[340px] flex items-center justify-center cursor-pointer hover:border-amber-700/60 transition-colors scale-in">
                <div className="text-center max-w-2xl">
                  {!flashFlipped ? (
                    <>
                      <div className="text-xs uppercase tracking-[0.3em] text-amber-500/70 mb-4">Term</div>
                      <h2 className="display-font text-3xl sm:text-4xl font-medium text-stone-100 mb-4">{currentFlash.term}</h2>
                      <p className="text-xs text-stone-500 mt-6 italic">tap to reveal</p>
                    </>
                  ) : (
                    <>
                      <div className="text-xs uppercase tracking-[0.3em] text-amber-500/70 mb-4">Definition</div>
                      <p className="text-base sm:text-lg text-stone-200 leading-relaxed">{currentFlash.def}</p>
                      <p className="text-xs text-stone-500 mt-6 italic">tap to flip back</p>
                    </>
                  )}
                </div>
              </div>
              <div className="flex justify-between items-center mt-4">
                <button onClick={() => { setFlashIndex(i => Math.max(0, i-1)); setFlashFlipped(false); }} disabled={flashIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  <ChevronLeft size={16} /> Previous
                </button>
                <div className="flex-1 mx-4 h-1 bg-stone-900 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-amber-700 to-amber-500" style={{ width: `${((flashIndex + 1) / FLASHCARDS.length) * 100}%` }}></div>
                </div>
                <button onClick={() => { setFlashIndex(i => Math.min(FLASHCARDS.length-1, i+1)); setFlashFlipped(false); }} disabled={flashIndex === FLASHCARDS.length-1} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  Next <ChevronRight size={16} />
                </button>
              </div>
            </div>
          )}

          {mode === 'essay' && currentEssay && (
            <div className="fade-in">
              <div className="bg-stone-950/60 border border-stone-800 rounded-lg p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
                <div>
                  <div className="text-xs text-stone-500 uppercase tracking-wider">Essay</div>
                  <div className="display-font text-2xl text-amber-400">{essayIndex + 1}<span className="text-stone-600">/{ESSAYS.length}</span></div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setRevealedEssay(r => !r)} className="text-xs px-3 py-1.5 border border-stone-800 hover:border-amber-700 rounded-md text-stone-300 hover:text-amber-400 transition-colors">
                    {revealedEssay ? 'Hide outline' : 'Show outline'}
                  </button>
                  {currentEssay.answer && (
                    <button onClick={() => setShowAnswer(s => !s)} className={`text-xs px-3 py-1.5 border rounded-md transition-colors ${showAnswer ? 'border-amber-600 bg-amber-950/40 text-amber-300' : 'border-stone-800 hover:border-amber-700 text-stone-300 hover:text-amber-400'}`}>
                      {showAnswer ? 'Hide answer' : 'Show full answer'}
                    </button>
                  )}
                </div>
              </div>
              <div key={essayIndex} className="bg-stone-950/60 border border-stone-800 rounded-lg p-6 sm:p-8 scale-in">
                <h2 className="display-font text-xl sm:text-2xl text-stone-100 leading-snug mb-6 italic">{currentEssay.title}</h2>
                {!revealedEssay && !showAnswer && (
                  <div className="text-center py-6">
                    <p className="text-stone-500 italic mb-1">Try drafting your own outline first.</p>
                    <p className="text-stone-600 text-sm">Then reveal outline or full answer to compare.</p>
                  </div>
                )}
                {revealedEssay && (
                  <div className="space-y-3 slide-right mb-6">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-2">Skeleton outline</div>
                    {currentEssay.points.map((pt, i) => (
                      <div key={i} className="flex gap-3 items-start">
                        <div className="flex-shrink-0 w-6 h-6 rounded-full border border-amber-700/50 text-amber-400 text-xs flex items-center justify-center mt-0.5">{i+1}</div>
                        <p className="text-sm text-stone-300 leading-relaxed pt-0.5">{pt}</p>
                      </div>
                    ))}
                  </div>
                )}
                {showAnswer && currentEssay.answer && (
                  <div className="slide-right pt-6 border-t border-stone-800">
                    <div className="text-xs uppercase tracking-wider text-amber-500/80 mb-3">Sample answer</div>
                    <div className="text-sm sm:text-base text-stone-200 leading-relaxed whitespace-pre-line">{currentEssay.answer}</div>
                  </div>
                )}
              </div>
              <div className="flex justify-between items-center mt-4">
                <button onClick={() => { setEssayIndex(i => Math.max(0, i-1)); setRevealedEssay(false); setShowAnswer(false); }} disabled={essayIndex === 0} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  <ChevronLeft size={16} /> Previous
                </button>
                <button onClick={() => { setEssayIndex(i => Math.min(ESSAYS.length-1, i+1)); setRevealedEssay(false); setShowAnswer(false); }} disabled={essayIndex === ESSAYS.length-1} className="flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  Next <ChevronRight size={16} />
                </button>
              </div>
            </div>
          )}

          {mode === 'quick' && (
            <div className="fade-in space-y-6">
              {QUICK_REFERENCE.map(section => (
                <div key={section.category} className="bg-stone-950/60 border border-stone-800 rounded-lg p-5 sm:p-7">
                  <div className="flex items-center gap-2 mb-5">
                    <div className="h-px flex-1 bg-stone-800"></div>
                    <h3 className="display-font text-lg italic text-amber-400 px-3">{section.category}</h3>
                    <div className="h-px flex-1 bg-stone-800"></div>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-2 sm:gap-3">
                    {section.items.map((item, i) => (
                      <div key={i} className="flex items-start gap-3 p-3 rounded-md border border-stone-800/50 bg-stone-900/30 hover:border-amber-800/50 hover:bg-amber-950/10 transition-colors">
                        <div className="display-font font-medium text-amber-300 text-base sm:text-lg flex-shrink-0 min-w-[60px]">{item.label}</div>
                        <p className="text-xs sm:text-sm text-stone-300 pt-1">{item.desc}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          <footer className="mt-12 pt-6 border-t border-stone-900 text-center">
            <p className="text-xs text-stone-600 italic display-font">EHS 503 · Day 6 · Made by Chidinma Nwatu (The Revolutionary Educator)</p>
          </footer>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
document.getElementById('loading').classList.add('hidden');
</script>
</body>
</html>
